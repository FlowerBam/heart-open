<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF6B9D">
  <meta name="description" content="잠깐의 위기인지 진짜 안 맞는 건지. 5가지 성향으로 갈등의 원인을 객관적으로 진단합니다.">

  <meta property="og:title" content="우리 관계, 회복할 수 있을까?">
  <meta property="og:description" content="잠깐의 위기인지 진짜 안 맞는 건지. 5가지 성향으로 객관적으로 봐요.">
  <meta property="og:image" content="https://flowerbam.github.io/heart-open/assets/og-crisis.png">
  <meta property="og:url" content="https://flowerbam.github.io/heart-open/crisis/">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ko_KR">

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX', {
      'page_title': 'Heart Open - Crisis',
      'page_path': '/crisis/'
    });
    gtag('set', 'user_properties', {
      'landing_segment': 'crisis'
    });
  </script>

  <title>우리 관계, 회복할 수 있을까? - Heart Open</title>

  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;padding:0}
    :root{
      --brand:#FF6B9D;
      --brand-pressed:#E55A88;
      --text:#1a1a1a;
      --text-muted:#555;
      --bg:#ffffff;
      --card:#fafafa;
      --border:#eee;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --text:#f5f5f7;
        --text-muted:#bbb;
        --bg:#0f0f10;
        --card:#1a1a1c;
        --border:#2a2a2c;
      }
    }
    body{
      font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
      color:var(--text);
      background:var(--bg);
      line-height:1.6;
      -webkit-font-smoothing:antialiased;
      -webkit-text-size-adjust:100%;
    }
    .container{
      max-width:600px;
      margin:0 auto;
      padding:24px;
    }
    @media (min-width:768px){
      .container{padding:40px}
    }
    .hero{
      min-height:80vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      animation:fadeIn .5s ease-out;
    }
    @keyframes fadeIn{
      from{opacity:0;transform:translateY(8px)}
      to{opacity:1;transform:none}
    }
    h1{
      font-size:28px;
      font-weight:700;
      line-height:1.35;
      margin:0 0 16px;
      letter-spacing:-.02em;
    }
    .sub{
      font-size:16px;
      color:var(--text-muted);
      margin:0 0 32px;
    }
    @media (min-width:768px){
      h1{font-size:36px}
      .sub{font-size:18px}
    }
    .cta-button{
      display:block;
      width:100%;
      min-height:56px;
      padding:16px 32px;
      font-size:18px;
      font-weight:600;
      font-family:inherit;
      color:#fff;
      background:var(--brand);
      border:none;
      border-radius:12px;
      cursor:pointer;
      transition:background .15s ease, transform .1s ease;
      -webkit-tap-highlight-color:transparent;
    }
    .cta-button:hover{background:var(--brand-pressed)}
    .cta-button:active{background:var(--brand-pressed);transform:scale(.99)}
    .proof{
      margin-top:48px;
      display:grid;
      gap:12px;
    }
    .proof-item{
      padding:16px 20px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:12px;
      font-size:16px;
      display:flex;
      align-items:center;
      gap:12px;
    }
    .proof-item::before{
      content:"";
      flex:0 0 8px;
      width:8px;height:8px;
      border-radius:50%;
      background:var(--brand);
    }
    .price{
      margin-top:32px;
      padding:20px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:12px;
      text-align:center;
    }
    .price strong{font-weight:600}
    .price .free{color:var(--brand);font-weight:700}
    .price small{display:block;margin-top:6px;color:var(--text-muted);font-size:14px}
    footer{
      margin-top:48px;
      padding-top:24px;
      border-top:1px solid var(--border);
      text-align:center;
      color:var(--text-muted);
      font-size:13px;
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1>우리 관계,<br>회복할 수 있을까?</h1>
      <p class="sub">잠깐의 위기인지 진짜 안 맞는 건지.<br>5가지 성향으로 객관적으로 봐요.</p>
      <button type="button" class="cta-button" onclick="trackAndDownload()" aria-label="앱 받고 객관적으로 보기">
        객관적으로 보기
      </button>

      <div class="proof" aria-label="앱 특징">
        <div class="proof-item">갈등의 진짜 원인 진단</div>
        <div class="proof-item">두 사람 가치관 차이 분석</div>
        <div class="proof-item">회복 가능성 객관적 평가</div>
      </div>

      <div class="price">
        <strong class="free">기본 분석 무료</strong>
        <small>심층 분석 1,900원 (단발 결제)</small>
      </div>
    </section>

    <footer>
      © Heart Open
    </footer>
  </main>

  <script>
    function trackAndDownload(){
      var segment='crisis';
      var platform=/iPhone|iPad|iPod/i.test(navigator.userAgent)?'ios':'android';
      try{
        gtag('event','cta_click',{
          'segment':segment,
          'destination':platform==='ios'?'app_store':'play_store'
        });
      }catch(e){}
      var utm='utm_source=threads&utm_medium=landing&utm_campaign=segment_test_v1&utm_content='+segment;
      var url=platform==='ios'
        ? 'https://apps.apple.com/app/[APP_ID]?'+utm
        : 'https://play.google.com/store/apps/details?id=com.heartopen&referrer='+encodeURIComponent(utm);
      setTimeout(function(){window.location.href=url;},100);
    }
  </script>
</body>
</html>
