  <script>

    gtag('config', 'G-2NYTV5FKDC', {
      'page_title': 'Honeymoon',
      'page_path': '/heart-open/honeymoon/'
    });
    gtag('set', 'user_properties', {

    });

  <title>100일 커플, 우리 잘 맞는 거 맞지? 💕 - Heart Open</title>

  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --primary:#FF6F91;
      --primary-light:#FFB3C6;
      --primary-dark:#D94F78;
      --accent:#C3B1E1;
      --accent-surface:#F4EEFF;
      --bg:#FFF9F7;
      --surface-warm:#FFF0EC;
      --card:#FFFFFF;
      --text-primary:#1A1A1A;
      --text-secondary:#6B6B6B;
      --success:#82C09A;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --bg:#1A1A1A;
        --card:#2A2A2A;
        --text-primary:#F5F5F5;
        --text-secondary:#A0A0A0;
      }
    }
    body{
      font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
      background:var(--bg);
      color:var(--text-primary);
      line-height:1.6;
      -webkit-font-smoothing:antialiased;
      -webkit-text-size-adjust:100%;
    }
    .container{
      max-width:600px;
      margin:0 auto;
      padding:24px;
    }
    .hero{
      min-height:80vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      text-align:center;
      padding:40px 0;
    }
    .hero h1{
      font-size:28px;
      font-weight:700;
      letter-spacing:-0.4px;
      line-height:1.4;
      margin-bottom:16px;
    }
    .hero p{
      font-size:16px;
      color:var(--text-secondary);
      line-height:1.7;
      margin-bottom:32px;
    }
    @media (min-width:600px){
      .hero h1{font-size:36px}
      .hero p{font-size:18px}
    }
    .cta-button{
      background:var(--primary);
      color:#fff;
      border:none;
      padding:18px 40px;
      font-size:18px;
      font-weight:700;
      border-radius:14px;
      cursor:pointer;
      min-height:56px;
      width:100%;
      max-width:320px;
      margin:0 auto;
      display:block;
      font-family:inherit;
      transition:all 0.2s ease;
      box-shadow:0 4px 14px rgba(255,111,145,0.3);
      -webkit-tap-highlight-color:transparent;
    }
    .cta-button:hover{background:var(--primary-dark);transform:translateY(-2px)}
    .cta-button:active{transform:translateY(0)}
    .evidence{padding:40px 0}
    .evidence-card{
      background:var(--card);
      border-radius:16px;
      padding:24px;
      margin-bottom:16px;
      box-shadow:0 2px 8px rgba(0,0,0,0.04);
    }
    .evidence-card .icon{font-size:32px;margin-bottom:12px}
    .evidence-card h3{
      font-size:18px;
      font-weight:600;
      margin-bottom:8px;
      color:var(--text-primary);
    }
    .evidence-card p{
      font-size:15px;
      color:var(--text-secondary);
      line-height:1.6;
    }
    .pricing{
      text-align:center;
      padding:24px 0;
      color:var(--text-secondary);
      font-size:14px;
    }
    .footer{
      text-align:center;
      padding:40px 0 24px;
      color:var(--text-secondary);
      font-size:13px;
    }
    .footer a{
      color:var(--text-secondary);
      text-decoration:none;
      margin:0 8px;
    }
    .fade-in{animation:fadeIn 0.6s ease-out}
    @keyframes fadeIn{
      from{opacity:0;transform:translateY(10px)}
      to{opacity:1;transform:translateY(0)}
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero fade-in">
      <h1>100일 커플, 우리 잘 맞는 거 맞지? 💕</h1>
      <p>남친이 나 어떻게 생각하는지 진짜 궁금하지 않아요?<br>둘이 같이 1분이면 끝나요.</p>
      <button class="cta-button" onclick="trackAndDownload()">1분이면 끝</button>
    </section>

    <section class="evidence">
      <div class="evidence-card">
        <div class="icon">⏱️</div>
        <h3>1분 컷</h3>
        <p>12개 질문이면 끝. 출퇴근길에 가능해요.</p>
      </div>
      <div class="evidence-card">
        <div class="icon">💑</div>
        <h3>둘이 같이</h3>
        <p>남친·여친 답변을 한눈에. 나만 알기엔 아까운 결과.</p>
      </div>
      <div class="evidence-card">
        <div class="icon">✨</div>
        <h3>5가지 연애 유형</h3>
        <p>MBTI 다음은 ESARP. 우리만의 케미 알아봐요.</p>
      </div>
    </section>

    <section class="pricing">
      <p>기본은 무료. 더 깊이 있는 궁합은 1,900원</p>
    </section>

    <section style="text-align:center;padding:24px 0;">
      <button class="cta-button" onclick="trackAndDownload()">1분이면 끝</button>
    </section>

    <footer class="footer">
      <p>Heart Open · 1년 동안 혼자 만든 커플 앱</p>
      <div style="margin-top:12px;">
        <a href="/heart-open/privacy">개인정보 처리방침</a> ·
        <a href="mailto:contact@heartopen.app">문의</a>
      </div>
    </footer>
  </div>

  <script>
    function trackAndDownload(){
      var segment='honeymoon';
      var platform=/iPhone|iPad|iPod/i.test(navigator.userAgent)?'ios':'android';
      try{
        gtag('event','cta_click',{
          'segment':segment,
          'destination':platform==='ios'?'app_store':'play_store'
        });
      }catch(e){}
      var utm='utm_source=threads&utm_medium=landing&utm_campaign=segment_test_v1&utm_content=landing_'+segment;
      var url=platform==='ios'
        ? 'https://apps.apple.com/app/id[APP_STORE_ID]?'+utm
        : 'https://play.google.com/store/apps/details?id=com.heartopen&referrer='+encodeURIComponent(utm);
      setTimeout(function(){window.location.href=url;},100);
    }
  </script>
</body>
</html>
