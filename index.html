<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heart Open — 커플 미니게임 모음</title>
  <meta name="description" content="22~28세 여성 커플을 위한 가벼운 호환성 놀이 20선">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="shared/tokens.css">

  <!-- GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2NYTV5FKDC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-2NYTV5FKDC');
  </script>
  <script src="shared/analytics.js" defer></script>

  <style>
    .hero {
      padding: var(--space-8) 0 var(--space-6);
      text-align: center;
    }
    .hero h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .hero p {
      margin-top: var(--space-3);
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-3);
      margin-top: var(--space-5);
    }

    .card {
      background: var(--card);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      text-align: center;
      transition: transform 0.15s ease, box-shadow 0.2s ease;
      position: relative;
    }
    .card.is-active {
      cursor: pointer;
    }
    .card.is-active:active {
      transform: scale(0.98);
      box-shadow: var(--shadow-md);
    }
    .card.is-pending {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .card-thumb {
      width: 72px;
      height: 72px;
      object-fit: contain;
      margin: 0 auto;
    }
    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .card-meta {
      font-size: 11px;
      color: var(--text-secondary);
    }
    .badge {
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: var(--radius-pill);
    }
    .badge-pending {
      background: var(--accent-surface);
      color: var(--primary-dark);
    }
    .badge-new {
      background: var(--primary);
      color: #fff;
    }

    footer {
      text-align: center;
      color: var(--text-secondary);
      font-size: 12px;
      padding: var(--space-8) 0 var(--space-6);
      line-height: 1.7;
    }
    footer a { color: var(--primary-dark); }
  </style>
</head>
<body>
  <div class="container">
    <header class="hero">
      <h1>Heart Open</h1>
      <p>우리 커플은 어떤 타입일까?<br>1분 안에 끝나는 가벼운 놀이 20개 💕</p>
    </header>

    <main>
      <div class="grid" id="grid"></div>
    </main>

    <footer>
      <a href="https://heartopen.app">앱에서 정밀 호환성 분석 →</a>
      <div style="margin-top:8px; font-size:11px;">© Heart Open</div>
    </footer>
  </div>

  <script>
    // 20 concepts; only Phase 1 (HEAAA-209 follow-up) is active initially.
    // Active state can be flipped per slug as child issues complete.
    const CONCEPTS = [
      { id: '01', slug: 'slot-match',       name: '슬롯 매칭',         char: 'romantic',    active: true,  phase: 1 },
      { id: '02', slug: 'card-memory',      name: '카드 메모리',       char: 'attachment',  active: true,  phase: 1 },
      { id: '03', slug: 'sync-answer',      name: '동시 답변',         char: 'social',      active: true,  phase: 1 },
      { id: '04', slug: 'gem-daily',        name: '보석 Daily',        char: 'practical',   active: false, phase: 3 },
      { id: '05', slug: 'pictogram-ice',    name: '픽토그램',          char: 'emotion',     active: false, phase: 2 },
      { id: '06', slug: 'chaos-drop',       name: '카오스 드롭',       char: 'social',      active: true,  phase: 1 },
      { id: '07', slug: 'tamagotchi',       name: '다마고치 성장',     char: 'attachment',  active: false, phase: 3 },
      { id: '08', slug: 'type-collection',  name: '5유형 콜렉션',      char: 'emotion',     active: false, phase: 2 },
      { id: '09', slug: 'gut-5sec',         name: '직감 5초 퀴즈',     char: 'romantic',    active: true,  phase: 1 },
      { id: '10', slug: 'lover-roulette',   name: '연인 룰렛',         char: 'romantic',    active: false, phase: 2 },
      { id: '11', slug: 'esarp-speed',      name: 'ESARP 스피드',      char: 'practical',   active: false, phase: 2 },
      { id: '12', slug: 'countdown-diag',   name: '카운트다운 궁합',   char: 'emotion',     active: false, phase: 2 },
      { id: '13', slug: 'char-mystery',     name: '캐릭터 정체 추리',  char: 'attachment',  active: false, phase: 2 },
      { id: '14', slug: 'type-partner',     name: '짝꿍 유형 찾기',    char: 'social',      active: false, phase: 2 },
      { id: '15', slug: 'pattern-analysis', name: '심리 패턴 분석',    char: 'practical',   active: false, phase: 3 },
      { id: '16', slug: 'bf-simulator',     name: '남친 머릿속',       char: 'emotion',     active: false, phase: 3 },
      { id: '17', slug: 'date-course',      name: '가상 데이트',       char: 'romantic',    active: false, phase: 2 },
      { id: '18', slug: 'conflict-branch',  name: '갈등 분기',         char: 'attachment',  active: false, phase: 3 },
      { id: '19', slug: 'makeup-msg',       name: '화해 메시지',       char: 'social',      active: false, phase: 3 },
      { id: '20', slug: 'couple-balance',   name: '커플 밸런스',       char: 'practical',   active: false, phase: 2 },
    ];

    const grid = document.getElementById('grid');
    CONCEPTS.forEach((c) => {
      const card = document.createElement(c.active ? 'a' : 'div');
      card.className = 'card ' + (c.active ? 'is-active' : 'is-pending');
      if (c.active) {
        card.href = c.slug + '/';
        card.addEventListener('click', () => {
          if (window.HeartOpenAnalytics) {
            window.HeartOpenAnalytics.trackGameStart(c.id, c.name);
          }
        });
      }

      const badge = document.createElement('span');
      badge.className = 'badge ' + (c.active ? 'badge-new' : 'badge-pending');
      badge.textContent = c.active ? 'NEW' : '준비중';

      const img = document.createElement('img');
      img.className = 'card-thumb';
      img.src = 'assets/characters/' + c.char + '.png';
      img.alt = c.name;
      img.loading = 'lazy';

      const title = document.createElement('div');
      title.className = 'card-title';
      title.textContent = c.name;

      const meta = document.createElement('div');
      meta.className = 'card-meta';
      meta.textContent = '#' + c.id + ' · Phase ' + c.phase;

      card.appendChild(badge);
      card.appendChild(img);
      card.appendChild(title);
      card.appendChild(meta);
      grid.appendChild(card);
    });
  </script>
</body>
</html>
