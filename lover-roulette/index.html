<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>오늘의 연인 룰렛 — Heart Open</title>
  <meta name="description" content="오늘 내 연인 타입을 룰렛으로 뽑아봐 🎰">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="../_shared/tokens.css">
  <script src="../_shared/result-esarp.js" defer></script>
  <link rel="stylesheet" href="../shared/result-card.css">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2NYTV5FKDC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-2NYTV5FKDC');
  </script>
  <script src="../shared/analytics.js" defer></script>
  <script src="../_shared/haptic.js" defer></script>
  <script src="../_shared/motion.js" defer></script>
  <script src="../_shared/ga4-funnel.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
  <script src="../shared/result-card.js" defer></script>
  <script src="../_shared/local-storage.js" defer></script>
  <script src="../_shared/share-card-ratio.js" defer></script>
  <script src="../_shared/share-caption.js" defer></script>
  <script src="../_shared/revisit-hook.js" defer></script>
  <script src="../_shared/stage2-engagement.js" defer></script>
  <style>
    .stage { padding-top: var(--space-6); text-align: center; }
    h1 { font-size: 22px; font-weight: 700; }
    .lead { color: var(--text-secondary); font-size: 14px; margin-top: var(--space-2); line-height: 1.6; }

    .wheel-wrap {
      position: relative;
      margin: var(--space-8) auto var(--space-4);
      width: 300px; height: 300px;
    }
    canvas#wheel {
      width: 300px; height: 300px;
      will-change: transform;
      transition: transform 3.5s cubic-bezier(0.17, 0.67, 0.12, 0.99);
    }
    .pointer {
      position: absolute;
      top: -8px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 22px solid var(--primary-dark);
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }
    .spin-btn, .start, .cta-restart {
      margin-top: var(--space-4);
      width: 100%;
      background: var(--primary);
      color: #fff;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      border-radius: var(--radius-pill);
      box-shadow: var(--shadow-md);
    }
    .spin-btn:disabled { opacity: 0.5; box-shadow: none; }
    .stat-line {
      margin-top: var(--space-3);
      font-size: 13px;
      color: var(--text-secondary);
    }
    .stat-note {
      margin-top: var(--space-2);
      font-size: 11px;
      color: var(--text-secondary);
      opacity: 0.7;
    }
    .badge-sim {
      display: inline-block;
      padding: 2px 8px;
      margin-right: 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--primary-dark);
      background: var(--accent-surface);
      border-radius: var(--radius-pill);
      vertical-align: middle;
    }

    .hidden { display: none !important; }

    @keyframes pop-in { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .pop-in { animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  </style>
</head>
<body data-concept-id="lover-roulette" data-concept-name="연인 룰렛" data-revisit-hooks="tomorrow,partner" data-share-hashtags="하트오픈룰렛,오늘의연인타입">
  <div class="container">
    <section id="screen-roulette" class="stage">
      <h1>오늘의 연인 룰렛 🎰</h1>
      <p class="lead">버튼 누르면 오늘 너의 연인 타입을<br>룰렛이 뽑아줘</p>
      <div class="wheel-wrap">
        <canvas id="wheel" width="600" height="600"></canvas>
        <div class="pointer"></div>
      </div>
      <button class="spin-btn" id="btn-spin">돌려!</button>
      <div class="stat-line" id="spin-count">오늘 0/3 회</div>
    </section>

    <section id="screen-result" class="stage hidden">
      <div class="result-card pop-in" id="result-card" role="status" aria-live="polite" aria-atomic="true">
        <img id="result-img" src="" alt="">
        <div class="result-title" id="result-title"></div>
        <div class="result-desc" id="result-desc"></div>
        <div class="stat-line" id="stat-line"><span class="badge-sim">시뮬레이션</span> 비슷한 타입 사람들도 있어</div>
        <div class="result-actions">
          <button class="btn-share" id="btn-share">공유</button>
          <button class="btn-save" id="btn-save">저장</button>
        </div>
        <a class="btn-cta" id="btn-cta" href="https://heartopen.app">앱에서 더 알아보기 →</a>
      </div>
      <button class="cta-restart" id="btn-again" style="background:transparent;color:var(--text-secondary);box-shadow:none;">다시 돌리기</button>
    </section>
  </div>

  <script>
    const CONCEPT_ID = '10';
    const CONCEPT_NAME = '오늘의 연인 룰렛';

    // 메시지 풀 ESARP×5 = 25개 (Stage 2 Must, evolution/10)
    const MSG_POOL = {
      E: [
        '오늘은 감정에 솔직한 하루 💕',
        '먼저 표현해봐, 마음이 닿아 💕',
        '솔직한 한 마디가 통하는 날',
        '감정 그대로 흘려봐, 괜찮아',
        '오늘은 마음 그릇이 넓어지는 날',
      ],
      S: [
        '오늘은 주변을 밝혀주는 날 ✨',
        '함께면 더 빛나는 하루 ✨',
        '활기 가득, 신나게 보내봐',
        '에너지 넘치는 자리에 들러봐',
        '오늘은 분위기 메이커 모드',
      ],
      A: [
        '오늘은 안정을 원하는 날 🌙',
        '편안하게 있어, 그게 정답',
        '느긋한 하루로 충전해봐',
        '익숙한 자리가 가장 따뜻해',
        '오늘은 신뢰가 깊어지는 날',
      ],
      R: [
        '오늘은 낭만 가득한 날 🌸',
        '설렘이 살짝 차오르는 하루',
        '작은 깜짝, 큰 설렘',
        '오늘은 예쁜 순간 남겨봐',
        '낭만 한 스푼, 기분 좋게',
      ],
      P: [
        '오늘은 차분한 현실 모드 🌱',
        '계획 세우기 딱 좋은 하루',
        '단단하게 한 걸음 내디뎌봐',
        '필요한 것부터, 천천히',
        '오늘은 정리가 자산이 되는 날',
      ],
    };
    function pickMsg(type) {
      const pool = MSG_POOL[type] || [];
      return pool[Math.floor(Math.random() * pool.length)] || '';
    }
    const SECTORS = [
      { type: 'E', color: '#FF6F91', label: '감정형', img: 'emotion.png' },
      { type: 'S', color: '#FFB347', label: '사교형', img: 'social.png' },
      { type: 'A', color: '#C3B1E1', label: '애착형', img: 'attachment.png' },
      { type: 'R', color: '#FF9EC4', label: '낭만형', img: 'romantic.png' },
      { type: 'P', color: '#82C09A', label: '현실형', img: 'practical.png' }
    ];
    // 가짜 통계 제거 (evolution/10_lover_roulette_evo.md Must) — GA4 누적 전까지 비율 미표시
    const SPIN_LIMIT = 3;
    const TODAY_KEY = 'heartopen.roulette.' + new Date().toISOString().slice(0, 10);

    const $ = (id) => document.getElementById(id);
    const wheelEl = $('wheel');
    let spinning = false;
    let spinCount = parseInt(localStorage.getItem(TODAY_KEY) || '0', 10);

    function drawWheel() {
      const ctx = wheelEl.getContext('2d');
      const cx = 300, cy = 300, r = 280;
      const arc = (2 * Math.PI) / SECTORS.length;
      ctx.clearRect(0, 0, 600, 600);
      SECTORS.forEach((sector, i) => {
        const start = i * arc - Math.PI / 2;
        const end = start + arc;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, start, end);
        ctx.fillStyle = sector.color;
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 4;
        ctx.stroke();
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(start + arc / 2);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 22px Pretendard, sans-serif';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        ctx.fillText(sector.label, r - 24, 0);
        ctx.restore();
      });
    }

    function updateSpinCount() {
      $('spin-count').textContent = '오늘 ' + spinCount + '/' + SPIN_LIMIT + ' 회';
      $('btn-spin').disabled = spinCount >= SPIN_LIMIT;
    }

    function spin() {
      if (spinning || spinCount >= SPIN_LIMIT) return;
      spinning = true;
      const targetIndex = Math.floor(Math.random() * SECTORS.length);
      const sector = SECTORS[targetIndex];
      const sectorAngle = 360 / SECTORS.length;
      const center = targetIndex * sectorAngle + sectorAngle / 2;
      const totalDeg = 360 * 5 + (360 - center);
      wheelEl.style.transform = 'rotate(' + totalDeg + 'deg)';
      gtag('event', 'roulette_spin', { concept_id: CONCEPT_ID, result_type: sector.type, spin_count: spinCount + 1 });
      setTimeout(() => {
        spinning = false;
        spinCount++;
        localStorage.setItem(TODAY_KEY, String(spinCount));
        if (navigator.vibrate) navigator.vibrate(200);
        showResult(sector);
      }, 3600);
    }

    function showResult(sector) {
      $('result-img').src = '../assets/characters/' + sector.img;
      $('result-img').alt = sector.label;
      $('result-title').textContent = '오늘은 ' + sector.label;
      let msg = pickMsg(sector.type);
      // 같은 타입 연속 3회 메타 메시지 (Should, evolution/10)
      try {
        if (window.HeartOpenLS) {
          const k = HeartOpenLS.lsKey('10', 'results');
          const arr = HeartOpenLS.lsAppend(k, { type: sector.type, ts: Date.now() }, { cap: 30 });
          const last3 = arr.slice(-3).map(function (x) { return x.type; });
          if (last3.length === 3 && last3.every(function (t) { return t === sector.type; })) {
            msg += ' · 최근 너는 진짜 ' + sector.label;
          }
        }
      } catch (_) {}
      $('result-desc').textContent = msg;
      ['screen-roulette','screen-result'].forEach(s => $(s).classList.toggle('hidden', s !== 'screen-result'));
      if (window.HeartOpenAnalytics) HeartOpenAnalytics.trackResultView(CONCEPT_ID, sector.type);
    }

    drawWheel();
    updateSpinCount();
    if (window.HeartOpenAnalytics) {
      // page_view fires once on load via the gtag config; helper kept consistent for parity
      window.addEventListener('load', () => HeartOpenAnalytics.trackPageView(CONCEPT_ID, CONCEPT_NAME));
    }

    $('btn-spin').addEventListener('click', () => {
      if (window.HeartOpenAnalytics) HeartOpenAnalytics.trackGameStart(CONCEPT_ID, CONCEPT_NAME);
      spin();
    });

    $('btn-share').addEventListener('click', () => {
      HeartOpenResultCard.shareResult({
        conceptId: CONCEPT_ID,
        title: 'Heart Open 오늘의 연인 — ' + $('result-title').textContent,
        url: location.href
      });
    });
    $('btn-save').addEventListener('click', () => HeartOpenResultCard.saveResult('#result-card'));
    $('btn-cta').addEventListener('click', () => {
      if (window.HeartOpenAnalytics) HeartOpenAnalytics.trackCtaClick(CONCEPT_ID, 'app_store');
    });
    $('btn-again').addEventListener('click', () => {
      ['screen-roulette','screen-result'].forEach(s => $(s).classList.toggle('hidden', s !== 'screen-roulette'));
      updateSpinCount();
    });
  </script>
</body>
</html>
