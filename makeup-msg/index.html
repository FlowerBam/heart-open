<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>화해 메시지 — Heart Open</title>
  <meta name="description" content="내 마음 상태를 고르면 화해 메시지를 만들어줘 💌">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="../_shared/tokens.css">
  <script src="../_shared/result-esarp.js" defer></script>
  <link rel="stylesheet" href="../shared/result-card.css">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2NYTV5FKDC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-2NYTV5FKDC');
  </script>
  <script src="../shared/analytics.js" defer></script>
  <script src="../_shared/haptic.js" defer></script>
  <script src="../_shared/motion.js" defer></script>
  <script src="../_shared/ga4-funnel.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
  <script src="../shared/result-card.js" defer></script>
  <script src="../_shared/local-storage.js" defer></script>
  <script src="../_shared/share-card-ratio.js" defer></script>
  <script src="../_shared/share-caption.js" defer></script>
  <script src="../_shared/revisit-hook.js" defer></script>
  <script src="../_shared/stage2-engagement.js" defer></script>
  <style>
    .stage { padding-top: var(--space-6); text-align: center; }
    h1 { font-size: 22px; font-weight: 700; line-height: 1.4; }
    .lead { color: var(--text-secondary); font-size: 14px; margin-top: var(--space-2); line-height: 1.6; }
    .start, .cta-restart, .next-btn {
      margin-top: var(--space-6); width: 100%;
      background: var(--primary); color: #fff;
      padding: 16px; font-size: 16px; font-weight: 700;
      border-radius: var(--radius-pill);
      box-shadow: var(--shadow-md);
    }

    .tag-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-3); margin-top: var(--space-5); }
    .tag {
      background: var(--card);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      box-shadow: var(--shadow-sm);
      font-size: 15px; font-weight: 600;
      display: flex; align-items: center; gap: var(--space-2);
      justify-content: center;
      border: 2px solid transparent;
    }
    .tag.on { border-color: var(--primary); background: var(--surface-warm); }
    .tag .e { font-size: 22px; }

    .sit-grid { display: grid; gap: var(--space-2); margin-top: var(--space-4); }
    .sit {
      background: var(--surface-warm);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      font-size: 15px; font-weight: 600;
      border: 2px solid transparent;
    }
    .sit.on { border-color: var(--primary); background: var(--accent-surface); }

    .msg-card {
      margin-top: var(--space-6);
      background: var(--surface-warm);
      border-radius: 18px;
      padding: var(--space-6) var(--space-5);
      box-shadow: var(--shadow-sm);
      text-align: center;
    }
    .msg-card img { width: 80px; height: 80px; object-fit: contain; margin: 0 auto var(--space-3); }
    .generated-msg {
      font-size: 16px; line-height: 1.7; color: var(--text-primary);
      min-height: 80px;
      white-space: pre-line;
    }
    .msg-actions { display: flex; gap: var(--space-3); margin-top: var(--space-4); }
    .msg-actions button {
      flex: 1;
      background: var(--card);
      color: var(--primary-dark);
      padding: 12px;
      font-size: 14px; font-weight: 700;
      border-radius: var(--radius-pill);
    }

    .notice {
      margin-top: var(--space-4);
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body data-concept-id="makeup-msg" data-concept-name="화해 메시지" data-revisit-hooks="partner,alt-ending" data-share-hashtags="하트오픈화해,화해메시지">
  <div class="container">
    <section id="screen-intro" class="stage">
      <h1>화해 메시지 만들기 💌</h1>
      <p class="lead">지금 내 마음과 상황을 고르면<br>너한테 어울리는 화해 메시지를 만들어줄게</p>
      <p class="notice">메시지는 이 페이지 안에서만 표시돼.<br>자동으로 어디에도 올라가지 않아.</p>
      <button class="start" id="btn-start">시작하기</button>
    </section>

    <section id="screen-emotions" class="stage hidden">
      <h1>지금 내 마음은? <span style="color:var(--text-secondary);font-size:13px;">(최대 2개)</span></h1>
      <div class="tag-grid" id="tag-grid"></div>
      <button class="next-btn" id="btn-next-1" disabled style="opacity:.5;">다음 →</button>
    </section>

    <section id="screen-situation" class="stage hidden">
      <h1>어떤 상황이야?</h1>
      <div class="sit-grid" id="sit-grid"></div>
      <button class="next-btn" id="btn-next-2" disabled style="opacity:.5;">메시지 받기 ✨</button>
    </section>

    <section id="screen-result" class="stage hidden">
      <h1>이렇게 보내볼까? 💕</h1>
      <div class="msg-card" id="result-card" role="status" aria-live="polite" aria-atomic="true">
        <img id="msg-img" src="" alt="">
        <p class="generated-msg" id="msg-text"></p>
        <div class="msg-actions">
          <button id="btn-copy">📋 복사</button>
          <button id="btn-regen">🔄 다시</button>
          <button id="btn-save">💾 저장</button>
        </div>
      </div>
      <p class="notice">바로 보내지 말고 한 번만 다시 읽어봐.<br>마음이 그대로면 보내도 좋아.</p>
      <button class="cta-restart" id="btn-share" style="background:var(--primary);color:#fff;">공유</button>
      <a class="cta-restart" id="btn-cta" href="https://heartopen.app" style="background:var(--text-primary);">앱에서 더 자세한 화해 가이드 →</a>
      <button class="cta-restart" id="btn-restart" style="background:transparent;color:var(--text-secondary);box-shadow:none;">처음부터 다시</button>
    </section>
  </div>

  <script>
    const CONCEPT_ID = '19';
    const CONCEPT_NAME = 'makeup_msg';

    const TAGS = [
      { id: 'sorry',    e: '🙏', label: '미안해',    char: 'emotion.png' },
      { id: 'miss',     e: '💕', label: '보고싶어',  char: 'attachment.png' },
      { id: 'scared',   e: '😟', label: '무서워',    char: 'attachment.png' },
      { id: 'love',     e: '❤️', label: '사랑해',    char: 'romantic.png' },
      { id: 'tired',    e: '😔', label: '지쳤어',    char: 'practical.png' },
      { id: 'confused', e: '😕', label: '잘 모르겠어', char: 'emotion.png' }
    ];

    const SITUATIONS = [
      { id: 'fight',  label: '오늘 살짝 다퉜어' },
      { id: 'misund', label: '오해가 있었던 것 같아' },
      { id: 'tired',  label: '둘 다 지쳤어' },
      { id: 'cold',   label: '며칠 어색해' }
    ];

    const TEMPLATES = {
      'miss+sorry': [
        '아까 내가 너무 세게 말한 것 같아. 미안해.\n근데 보고 싶어서 먼저 연락했어 💕',
        '나 좀 반성했어. 너도 이유가 있었을 텐데...\n보고 싶다, 진심으로.'
      ],
      'love+sorry': [
        '화내서 미안해.\n그래도 사랑하는 마음은 변함없어. 잘 지내고 있어?',
        '내가 틀렸던 것 같아. 사랑해 — 그 말 하고 싶어서 먼저 연락했어.'
      ],
      'miss+scared': [
        '우리 사이가 멀어질까봐 좀 무서워.\n잠깐 통화할 수 있어? 보고 싶어.',
        '솔직히 말할게. 너 없이 지내는 거 무서워.\n정말 보고 싶어.'
      ],
      'love+tired': [
        '우리 둘 다 지쳤던 것 같아.\n그래도 나는 아직 너가 좋아 💕',
        '힘든 시간이었지.\n그래도 내 마음에는 여전히 너뿐이야.'
      ],
      'sorry+tired': [
        '내가 좀 지쳐서 짜증 부린 것 같아. 미안.\n네 탓 아니야, 그냥 오늘 좀 그랬어.',
        '컨디션 핑계 같지만, 미안해.\n조금만 쉬고 다시 잘 얘기해보자.'
      ],
      'confused+sorry': [
        '내 마음도 잘 정리가 안 돼.\n근데 그 와중에도 너한테 미안한 건 분명해.',
        '솔직히 잘 모르겠어. 그래도 일단 미안하다고 먼저 말하고 싶었어.'
      ],
      'miss+love': [
        '보고 싶다, 정말로.\n사랑한다는 말 그냥 한 번 하고 싶었어 💕',
        '오늘 따라 네 생각이 많이 나.\n사랑해, 잘 자.'
      ],
      'scared+sorry': [
        '내가 너무 몰아붙였던 것 같아. 미안해.\n사실 너 잃을까봐 무서웠어.',
        '미안해. 무서운 마음에 모진 말이 나왔어.\n진심은 그게 아니야.'
      ],
      default: [
        '우리 잠깐 얘기 좀 해볼까?\n진심으로 대화하고 싶어.',
        '솔직하게 말할게.\n너 때문에 오늘 많이 생각했어.'
      ]
    };

    const SITUATION_OPENERS = {
      fight:  '',
      misund: '\n\n혹시 오해 있었던 거면 다시 듣고 싶어.',
      tired:  '\n\n오늘 말고, 마음 좀 풀린 다음에 다시 얘기해도 돼.',
      cold:   '\n\n며칠 어색했지. 먼저 손 내미는 거 어렵지만 해볼게.'
    };

    const $ = (id) => document.getElementById(id);
    let picked = [];
    let situation = null;
    let lastTemplateKey = null;

    function showOnly(id) {
      ['screen-intro','screen-emotions','screen-situation','screen-result']
        .forEach(s => $(s).classList.toggle('hidden', s !== id));
    }
    function renderTags() {
      const g = $('tag-grid');
      g.innerHTML = '';
      TAGS.forEach(t => {
        const b = document.createElement('button');
        b.className = 'tag';
        b.dataset.id = t.id;
        b.innerHTML = `<span class="e">${t.e}</span><span>${t.label}</span>`;
        b.addEventListener('click', () => toggleTag(t.id, b));
        g.appendChild(b);
      });
    }
    function toggleTag(id, el) {
      const i = picked.indexOf(id);
      if (i >= 0) {
        picked.splice(i, 1);
        el.classList.remove('on');
      } else {
        if (picked.length >= 2) {
          const drop = picked.shift();
          document.querySelectorAll('.tag').forEach(t => {
            if (t.dataset.id === drop) t.classList.remove('on');
          });
        }
        picked.push(id);
        el.classList.add('on');
      }
      const ok = picked.length >= 1;
      $('btn-next-1').disabled = !ok;
      $('btn-next-1').style.opacity = ok ? '1' : '.5';
    }
    function renderSituations() {
      const g = $('sit-grid');
      g.innerHTML = '';
      SITUATIONS.forEach(s => {
        const b = document.createElement('button');
        b.className = 'sit';
        b.dataset.id = s.id;
        b.textContent = s.label;
        b.addEventListener('click', () => {
          situation = s.id;
          document.querySelectorAll('.sit').forEach(x => x.classList.toggle('on', x.dataset.id === s.id));
          $('btn-next-2').disabled = false;
          $('btn-next-2').style.opacity = '1';
        });
        g.appendChild(b);
      });
    }

    function generate() {
      const sorted = picked.slice().sort();
      const key = sorted.join('+');
      lastTemplateKey = key;
      const list = TEMPLATES[key] || TEMPLATES.default;
      const base = list[Math.floor(Math.random() * list.length)];
      const opener = SITUATION_OPENERS[situation] || '';
      const msg = base + opener;
      const charType = picked[0] || 'sorry';
      const charFile = (TAGS.find(t => t.id === charType) || {}).char || 'emotion.png';
      $('msg-img').src = '../assets/characters/' + charFile;
      $('msg-img').alt = '';
      typewriter($('msg-text'), msg, 22);
      gtag('event', 'message_generated', { concept_id: CONCEPT_ID, template_key: key, situation });
      if (window.HeartOpenAnalytics) HeartOpenAnalytics.trackResultView(CONCEPT_ID, key);
    }

    let typeTimer = null;
    function typewriter(el, text, speed) {
      if (typeTimer) clearInterval(typeTimer);
      el.textContent = '';
      let i = 0;
      typeTimer = setInterval(() => {
        if (i >= text.length) { clearInterval(typeTimer); return; }
        el.textContent += text[i++];
      }, speed || 22);
    }

    $('btn-start').addEventListener('click', () => {
      if (window.HeartOpenAnalytics) {
        HeartOpenAnalytics.trackPageView(CONCEPT_ID, CONCEPT_NAME);
        HeartOpenAnalytics.trackGameStart(CONCEPT_ID, CONCEPT_NAME);
      }
      picked = []; situation = null;
      renderTags();
      $('btn-next-1').disabled = true; $('btn-next-1').style.opacity = '.5';
      showOnly('screen-emotions');
    });
    $('btn-next-1').addEventListener('click', () => {
      gtag('event', 'emotions_selected', { concept_id: CONCEPT_ID, emotions: picked.join(',') });
      renderSituations();
      $('btn-next-2').disabled = true; $('btn-next-2').style.opacity = '.5';
      showOnly('screen-situation');
    });
    $('btn-next-2').addEventListener('click', () => {
      showOnly('screen-result');
      generate();
    });
    $('btn-regen').addEventListener('click', generate);
    $('btn-copy').addEventListener('click', async () => {
      const txt = $('msg-text').textContent;
      try {
        await navigator.clipboard.writeText(txt);
        gtag('event', 'message_copied', { concept_id: CONCEPT_ID, template_key: lastTemplateKey });
        alert('복사됨 💕');
      } catch (_) {
        alert('복사 실패. 길게 눌러서 직접 복사해줘.');
      }
    });
    $('btn-save').addEventListener('click', () => {
      gtag('event', 'message_saved', { concept_id: CONCEPT_ID, template_key: lastTemplateKey });
      HeartOpenResultCard.saveResult('#result-card');
    });
    $('btn-share').addEventListener('click', () => {
      HeartOpenResultCard.shareResult({
        conceptId: CONCEPT_ID,
        title: 'Heart Open 화해 메시지 만들기',
        url: location.href
      });
    });
    $('btn-cta').addEventListener('click', () => {
      if (window.HeartOpenAnalytics) HeartOpenAnalytics.trackCtaClick(CONCEPT_ID, 'app_store');
    });
    $('btn-restart').addEventListener('click', () => {
      picked = []; situation = null;
      showOnly('screen-intro');
    });
  </script>
</body>
</html>
