<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>우리 패턴 보기 — Heart Open</title>

  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="../_shared/tokens.css">
  <script src="../_shared/result-esarp.js" defer></script>
  <link rel="stylesheet" href="../shared/result-card.css">

  <script>

    function gtag(){ dataLayer.push(arguments); }

  <script src="../_shared/motion.js" defer></script>
  <script src="../_shared/ga4-funnel.js" defer></script>

  <script src="../_shared/stage2-engagement.js" defer></script>
  <script src="../_shared/stage3-signature.js" defer></script>
  <style>
    .stage { padding-top: var(--space-6); text-align: center; }
    h1 { font-size: 22px; font-weight: 700; line-height: 1.4; }
    .lead { color: var(--text-secondary); font-size: 14px; margin-top: var(--space-2); line-height: 1.6; }
    .start, .cta-restart {
      margin-top: var(--space-6); width: 100%;
      background: var(--primary); color: #fff;
      padding: 16px; font-size: 16px; font-weight: 700;
      border-radius: var(--radius-pill);
      box-shadow: var(--shadow-md);
    }
    .progress-dots {
      display: flex; gap: 6px; justify-content: center; margin-top: var(--space-4);
    }
    .progress-dots .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent-surface);
    }
    .progress-dots .dot.on { background: var(--primary); }

    .qcard {
      margin-top: var(--space-6);
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: var(--space-6) var(--space-5);
      box-shadow: var(--shadow-sm);
    }
    .qtext { font-size: 16px; font-weight: 700; line-height: 1.55; }
    .opts { display: grid; gap: var(--space-2); margin-top: var(--space-5); }
    .opt {
      background: var(--surface-warm);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      font-size: 15px; font-weight: 600;
      color: var(--text-primary);
      text-align: center;
    }
    .opt:active { transform: scale(0.98); }

    .loading {
      margin-top: var(--space-10);
      font-size: 15px;
      color: var(--text-secondary);
      min-height: 60px;
    }
    .loading-dots::after {
      content: '...';
      animation: blink 1s infinite;
    }
    @keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0.2; } }

    .tip-card {
      margin-top: var(--space-4);
      background: var(--accent-surface);
      border-radius: var(--radius-md);
      padding: var(--space-4) var(--space-5);
      font-size: 14px;
      color: var(--primary-dark);
      line-height: 1.6;
    }
    .hidden { display: none !important; }

    /* Stage 3 — Signature ★ */
    .result-card { position: relative; }
    .sfx-toggle {
      position: absolute; top: 12px; right: 12px;
      width: 36px; height: 36px;
      border-radius: 999px;
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(0,0,0,0.06);
      box-shadow: var(--shadow-sm);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 16px; line-height: 1;
      z-index: 5;
    }
    .sfx-toggle[aria-pressed="true"] { background: var(--primary); color: #fff; }

    /* Pattern bars (Stage 1 [Must] visualization, used both variants but emphasized in B) */
    .pattern-bars {
      margin-top: var(--space-4);
      display: grid;
      gap: var(--space-2);
      text-align: left;
    }
    .pattern-bars .bar {
      display: grid;
      grid-template-columns: 88px 1fr 44px;
      align-items: center;
      gap: var(--space-2);
      font-size: 12px;
    }
    .pattern-bars .bar-label { color: var(--text-secondary); font-weight: 600; }
    .pattern-bars .bar-track {
      position: relative;
      height: 10px;
      background: rgba(0,0,0,0.05);
      border-radius: 999px;
      overflow: hidden;
    }
    .pattern-bars .bar-fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 0;
      background: var(--bar-color, var(--primary));
      border-radius: 999px;
      transition: width 0.9s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .pattern-bars .bar.is-main .bar-label { color: var(--text-primary); font-weight: 700; }
    .pattern-bars .bar-value { font-variant-numeric: tabular-nums; color: var(--text-secondary); text-align: right; }

    /* Scenario card — 5 패턴별 3-step 시각화 */
    .scene-card {
      margin-top: var(--space-5);
      background: var(--card);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      box-shadow: var(--shadow-sm);
      text-align: left;
    }
    .scene-head {
      display: flex; align-items: center; justify-content: space-between;
      gap: var(--space-2);
    }
    .scene-title { font-size: 13px; font-weight: 700; color: var(--text-primary); }
    .scene-hint { font-size: 11px; color: var(--text-secondary); }
    .scene-stage {
      position: relative;
      margin-top: var(--space-3);
      height: 140px;
      border-radius: var(--radius-sm);
      background: var(--scene-bg, rgba(0,0,0,0.03));
      overflow: hidden;
    }
    .scene-stage svg { width: 100%; height: 100%; display: block; }
    .scene-step-text {
      margin-top: var(--space-3);
      min-height: 42px;
      font-size: 13px; line-height: 1.55;
      color: var(--text-primary);
      font-weight: 600;
    }
    .scene-step-text .num {
      display: inline-block;
      min-width: 18px; height: 18px;
      line-height: 18px;
      text-align: center;
      border-radius: 999px;
      background: var(--scene-accent, var(--primary));
      color: #fff;
      font-size: 11px; font-weight: 700;
      margin-right: 6px;
      vertical-align: middle;
    }
    .scene-controls {
      display: flex; align-items: center; justify-content: space-between;
      gap: var(--space-2);
      margin-top: var(--space-3);
    }
    .scene-dots { display: flex; gap: 6px; }
    .scene-dots .d {
      width: 6px; height: 6px; border-radius: 999px;
      background: rgba(0,0,0,0.15);
    }
    .scene-dots .d.on { background: var(--scene-accent, var(--primary)); }
    .scene-next {
      background: var(--scene-accent, var(--primary));
      color: #fff;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 12px; font-weight: 700;
      min-width: 92px;
    }
    .scene-break {
      margin-top: var(--space-3);
      padding: var(--space-3);
      background: rgba(255,255,255,0.5);
      border-left: 3px solid var(--scene-accent, var(--primary));
      border-radius: var(--radius-sm);
      font-size: 12px; line-height: 1.55;
      color: var(--text-primary);
    }
    .scene-break strong { color: var(--scene-accent, var(--primary)); }

    /* Step animation primitives — only run for the active step */
    .scene-step-anim { opacity: 0; }
    .scene-stage[data-step="0"] [data-anim="step-1"],
    .scene-stage[data-step="1"] [data-anim="step-2"],
    .scene-stage[data-step="2"] [data-anim="step-3"] {
      opacity: 1;
      animation: scene-pop 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes scene-pop {
      from { transform: translateY(8px) scale(0.95); opacity: 0; }
      to   { transform: translateY(0)    scale(1);    opacity: 1; }
    }
    .scene-pulse { transform-origin: center; animation: scene-breathe 2s ease-in-out infinite; }
    @keyframes scene-breathe {
      0%,100% { transform: scale(1); }
      50%     { transform: scale(1.06); }
    }

    /* Variant A vs B — A: text first, B: viz first + "더 보기" toggle */
    .text-block { margin-top: var(--space-4); }
    .variant-b .text-block.collapsed { display: none; }
    .more-toggle {
      margin-top: var(--space-3);
      font-size: 12px; font-weight: 700;
      color: var(--primary);
      background: transparent;
      padding: 6px 10px;
      border-radius: 999px;
    }
    .variant-a .more-toggle { display: none; }

    /* In Variant B, scenario+bars come BEFORE the (collapsed) text block. */
    .variant-b .pattern-bars { order: 1; }
    .variant-b .scene-card   { order: 2; }
    .variant-b .more-toggle  { order: 3; }
    .variant-b .text-block   { order: 4; }
    .variant-b #result-card { display: flex; flex-direction: column; }
    .variant-b #result-img       { order: 0; }
    .variant-b #result-title     { order: 0; }
    .variant-b .result-actions   { order: 5; }
    .variant-b #btn-cta          { order: 6; }
    .variant-b .sfx-toggle       { order: 0; }

    @media (prefers-reduced-motion: reduce) {
      .pattern-bars .bar-fill,
      .scene-stage [data-anim],
      .scene-pulse { animation: none !important; transition: none !important; opacity: 1 !important; }
    }
  </style>
</head>
<body data-concept-id="pattern-analysis" data-concept-name="커플 패턴" data-revisit-hooks="partner,friend" data-share-hashtags="하트오픈패턴,커플갈등패턴">
  <div class="container">
    <section id="screen-intro" class="stage">
      <h1>우리 패턴 보기 🔍</h1>
      <p class="lead">우리 사이에서 자주 일어나는 일들...<br>5문제만 솔직하게 체크해봐</p>
      <button class="start" id="btn-start">시작하기</button>
    </section>

    <section id="screen-q" class="stage hidden">
      <div class="progress-dots" id="dots"></div>
      <div class="qcard">
        <div class="qtext" id="qtext"></div>
        <div class="opts" id="opts"></div>
      </div>
    </section>

    <section id="screen-loading" class="stage hidden">
      <h1>패턴 살피는 중 ✨</h1>
      <p class="loading loading-dots" id="loading-text">답변 패턴 보고 있어</p>
    </section>

    <section id="screen-result" class="stage hidden">
      <div class="result-card" id="result-card" role="status" aria-live="polite" aria-atomic="true">
        <button class="sfx-toggle" id="btn-sfx" type="button" aria-pressed="false" aria-label="사운드 켜기/끄기" title="사운드 토글">🔇</button>
        <img id="result-img" src="" alt="">
        <div class="result-title" id="result-title"></div>

        <div class="pattern-bars" id="pattern-bars" role="img" aria-label=""></div>

        <div class="scene-card" id="scene-card" hidden>
          <div class="scene-head">
            <div class="scene-title" id="scene-title">상황 카드</div>
            <div class="scene-hint">탭해서 단계별로 보기</div>
          </div>
          <div class="scene-stage" id="scene-stage" data-step="0" aria-live="polite"></div>
          <div class="scene-step-text" id="scene-step-text"></div>
          <div class="scene-controls">
            <div class="scene-dots" id="scene-dots">
              <span class="d on"></span><span class="d"></span><span class="d"></span>
            </div>
            <button type="button" class="scene-next" id="scene-next">다음 →</button>
          </div>
          <div class="scene-break" id="scene-break" hidden></div>
        </div>

        <button type="button" class="more-toggle" id="more-toggle" aria-expanded="false">설명 더 보기 ▾</button>

        <div class="text-block" id="text-block">
          <div class="result-desc" id="result-desc"></div>
          <div class="tip-card" id="tip-card"></div>
        </div>

        <div class="result-actions">
          <button class="btn-share" id="btn-share">공유</button>
          <button class="btn-save" id="btn-save">저장</button>
        </div>
        <a class="btn-cta" id="btn-cta" href="https://heartopen.app">앱에서 우리 패턴 깊게 보기 →</a>
      </div>
      <button class="cta-restart" id="btn-restart" style="background:transparent;color:var(--text-secondary);box-shadow:none;">다시 해보기</button>
    </section>
  </div>

  <script>
    const CONCEPT_ID = '15';
    const CONCEPT_NAME = 'pattern_analysis';

    const PATTERNS = [
      { text: '남친이 말 없이 조용해지면 더 불안해져',           esarp: 'A' },
      { text: '갈등이 생기면 내 감정을 바로 표현하는 편이야',     esarp: 'E' },
      { text: '싸우면 혼자서 해결책부터 먼저 생각해봐',           esarp: 'P' },
      { text: '분위기가 안 좋아지면 농담으로 풀려고 해',          esarp: 'S' },
      { text: '화해할 때 작은 이벤트나 선물이 있으면 좋아',       esarp: 'R' }
    ];
    const OPTIONS = [
      { label: '자주 있어', score: 3 },
      { label: '가끔 있어', score: 2 },
      { label: '없어',       score: 1 }
    ];

    const TYPES = {
      A: {
        name: '안정 추구형',
        char: 'attachment.png',
        desc: '불안할 때 확인이 필요한 결이야. 솔직하게 "나 지금 좀 불안해"라고 말해봐.',
        tip: '안심을 요청하는 건 약한 게 아니야 — 솔직함이 신뢰를 만들어 🌙'
      },
      E: {
        name: '감정 표현형',
        char: 'emotion.png',
        desc: '감정이 먼저 올라오는 결이야. 표현하는 건 좋은데 타이밍이 중요해.',
        tip: '바로 말하기보다 10분만 기다려봐 — 그게 더 잘 전달돼 💕'
      },
      P: {
        name: '해결 정리형',
        char: 'practical.png',
        desc: '감정보다 해결이 먼저인 결. 남친 입장에선 공감이 먼저 필요할 수도 있어.',
        tip: '"어떻게 할까?"보다 "많이 힘들었겠다"가 먼저야 🌱'
      },
      S: {
        name: '분위기 풀이형',
        char: 'social.png',
        desc: '분위기를 풀려는 본능이 있는 결. 가끔은 진지한 대화도 필요해.',
        tip: '웃음으로 넘기지 말고 "사실 이게 걱정됐어"를 한 번만 말해봐 ✨'
      },
      R: {
        name: '낭만 기대형',
        char: 'romantic.png',
        desc: '화해에 작은 특별함을 기대하는 결. 남친이 모를 수 있으니까 직접 알려줘.',
        tip: '"꽃 한 송이면 다 잊어버릴 것 같아"처럼 구체적으로 말해줘 🌸'
      }
    };

    // Stage 3 [Must] — 5 패턴 × 3-step 시그니처 시나리오 + 깰 한 마디
    const SCENES = {
      A: {
        title: '안정 추구 결 · 갈등 흐름',
        steps: [
          { text: '남친 답장 줄어 / 조용해짐', svg: sceneA(0) },
          { text: '내 마음 ↑ 불안이 차오름',     svg: sceneA(1) },
          { text: '“괜찮아?” 확인하고 싶어짐',  svg: sceneA(2) }
        ],
        breakLine: '“나 지금 좀 불안해 — 한 마디만 해줘”라고 솔직히 말해봐.'
      },
      E: {
        title: '감정 표현 결 · 갈등 흐름',
        steps: [
          { text: '말 한 마디에 감정이 훅 올라옴', svg: sceneE(0) },
          { text: '바로 표현 → 톤이 거세짐',       svg: sceneE(1) },
          { text: '말하고 나니 후회가 옴',         svg: sceneE(2) }
        ],
        breakLine: '바로 말하기 전 10분만 숨 고르고 — 같은 말도 더 잘 닿아.'
      },
      P: {
        title: '해결 정리 결 · 갈등 흐름',
        steps: [
          { text: '갈등 발생 → 즉시 원인 분해', svg: sceneP(0) },
          { text: '“어떻게 할까?” 해결책 제시',   svg: sceneP(1) },
          { text: '상대는 공감을 원하던 중',       svg: sceneP(2) }
        ],
        breakLine: '해결 카드 꺼내기 전에 “많이 힘들었겠다” 한 번만 먼저.'
      },
      S: {
        title: '분위기 풀이 결 · 갈등 흐름',
        steps: [
          { text: '분위기 무거워지기 시작',     svg: sceneS(0) },
          { text: '농담·웃음으로 톤 바꿈',       svg: sceneS(1) },
          { text: '진짜 얘기는 다음으로 미뤄짐', svg: sceneS(2) }
        ],
        breakLine: '“사실 이게 좀 걱정됐어” — 농담 한 번 미루고 한 줄 진심.'
      },
      R: {
        title: '낭만 기대 결 · 갈등 흐름',
        steps: [
          { text: '화해 신호를 기다리는 중',       svg: sceneR(0) },
          { text: '작은 이벤트가 있길 기대',       svg: sceneR(1) },
          { text: '없으면 서운함이 한 겹 남음',     svg: sceneR(2) }
        ],
        breakLine: '“꽃 한 송이면 풀려” 처럼 구체적으로 알려주면 닿아.'
      }
    };

    // 패턴별 시각 색상 (esarp-voice.color 와 일치)
    const PATTERN_COLOR = {
      A: '#C3B1E1', E: '#FF6F91', P: '#82C09A', S: '#FFB347', R: '#FF9EC4'
    };
    const PATTERN_SHORT = { A: '안정 추구', E: '감정 표현', P: '해결 정리', S: '분위기 풀이', R: '낭만 기대' };
    const ESARP_ORDER = ['A', 'E', 'P', 'S', 'R'];

    // 5 패턴 시그니처 SVG — 단계별 요소만 노출 (CSS data-step 으로 토글)
    function sceneA(_) {
      return ''
        + '<svg viewBox="0 0 200 140" preserveAspectRatio="xMidYMid meet">'
        +   '<defs><radialGradient id="aGlow" cx="50%" cy="50%" r="60%">'
        +     '<stop offset="0%" stop-color="#C3B1E1" stop-opacity="0.55"/>'
        +     '<stop offset="100%" stop-color="#C3B1E1" stop-opacity="0"/>'
        +   '</radialGradient></defs>'
        +   '<g data-anim="step-1" class="scene-step-anim">'
        +     '<rect x="20" y="40" width="80" height="60" rx="14" fill="#fff" stroke="#C3B1E1" stroke-width="2"/>'
        +     '<text x="60" y="76" text-anchor="middle" font-size="22" fill="#999">…</text>'
        +     '<text x="60" y="120" text-anchor="middle" font-size="10" fill="#888">남친</text>'
        +   '</g>'
        +   '<g data-anim="step-2" class="scene-step-anim">'
        +     '<circle cx="150" cy="70" r="34" fill="url(#aGlow)" class="scene-pulse"/>'
        +     '<text x="150" y="76" text-anchor="middle" font-size="22">💜</text>'
        +     '<text x="150" y="120" text-anchor="middle" font-size="10" fill="#888">내 마음</text>'
        +     '<path d="M150 50 L150 32" stroke="#C3B1E1" stroke-width="2" stroke-linecap="round" marker-end="url(#aArrow)"/>'
        +     '<defs><marker id="aArrow" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="6" markerHeight="6" orient="auto">'
        +       '<path d="M0 0 L8 4 L0 8 Z" fill="#C3B1E1"/></marker></defs>'
        +   '</g>'
        +   '<g data-anim="step-3" class="scene-step-anim">'
        +     '<rect x="40" y="20" width="120" height="36" rx="18" fill="#C3B1E1"/>'
        +     '<text x="100" y="44" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">괜찮아? 💬</text>'
        +     '<path d="M90 56 L100 70 L110 56 Z" fill="#C3B1E1"/>'
        +   '</g>'
        + '</svg>';
    }
    function sceneE(_) {
      return ''
        + '<svg viewBox="0 0 200 140" preserveAspectRatio="xMidYMid meet">'
        +   '<g data-anim="step-1" class="scene-step-anim">'
        +     '<circle cx="60" cy="74" r="22" fill="#FF6F91" opacity="0.35"/>'
        +     '<text x="60" y="80" text-anchor="middle" font-size="22">💢</text>'
        +     '<text x="60" y="118" text-anchor="middle" font-size="10" fill="#888">감정 ↑</text>'
        +   '</g>'
        +   '<g data-anim="step-2" class="scene-step-anim">'
        +     '<rect x="40" y="30" width="130" height="40" rx="20" fill="#FF6F91"/>'
        +     '<text x="105" y="55" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">왜 그래!! 🔥</text>'
        +     '<path d="M55 70 L65 84 L75 70 Z" fill="#FF6F91"/>'
        +     '<text x="60" y="118" text-anchor="middle" font-size="10" fill="#888">바로 표현</text>'
        +   '</g>'
        +   '<g data-anim="step-3" class="scene-step-anim">'
        +     '<text x="100" y="62" text-anchor="middle" font-size="22">😶</text>'
        +     '<text x="100" y="86" text-anchor="middle" font-size="11" fill="#888">… 후회</text>'
        +     '<path d="M70 100 Q100 110 130 100" stroke="#FF6F91" stroke-width="2" fill="none" stroke-linecap="round"/>'
        +   '</g>'
        + '</svg>';
    }
    function sceneP(_) {
      return ''
        + '<svg viewBox="0 0 200 140" preserveAspectRatio="xMidYMid meet">'
        +   '<g data-anim="step-1" class="scene-step-anim">'
        +     '<rect x="30" y="40" width="60" height="60" rx="8" fill="#82C09A" opacity="0.18"/>'
        +     '<text x="60" y="76" text-anchor="middle" font-size="22">🧩</text>'
        +     '<text x="60" y="120" text-anchor="middle" font-size="10" fill="#888">원인 분해</text>'
        +   '</g>'
        +   '<g data-anim="step-2" class="scene-step-anim">'
        +     '<rect x="40" y="30" width="130" height="40" rx="6" fill="#82C09A"/>'
        +     '<text x="105" y="55" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">1) … 2) … 3) …</text>'
        +     '<text x="105" y="118" text-anchor="middle" font-size="10" fill="#888">해결책 제시</text>'
        +   '</g>'
        +   '<g data-anim="step-3" class="scene-step-anim">'
        +     '<rect x="20" y="46" width="80" height="50" rx="12" fill="#fff" stroke="#82C09A" stroke-width="2"/>'
        +     '<text x="60" y="76" text-anchor="middle" font-size="18">🥲</text>'
        +     '<text x="60" y="120" text-anchor="middle" font-size="10" fill="#888">상대 마음</text>'
        +     '<text x="150" y="62" text-anchor="middle" font-size="22">💭</text>'
        +     '<text x="150" y="84" text-anchor="middle" font-size="10" fill="#888">공감 필요</text>'
        +   '</g>'
        + '</svg>';
    }
    function sceneS(_) {
      return ''
        + '<svg viewBox="0 0 200 140" preserveAspectRatio="xMidYMid meet">'
        +   '<g data-anim="step-1" class="scene-step-anim">'
        +     '<path d="M20 90 Q60 70 100 90 T180 90" stroke="#FFB347" stroke-width="3" fill="none" stroke-linecap="round"/>'
        +     '<text x="100" y="60" text-anchor="middle" font-size="20">🌫️</text>'
        +     '<text x="100" y="118" text-anchor="middle" font-size="10" fill="#888">분위기 무거움</text>'
        +   '</g>'
        +   '<g data-anim="step-2" class="scene-step-anim">'
        +     '<text x="100" y="62" text-anchor="middle" font-size="22">🤣</text>'
        +     '<rect x="35" y="74" width="130" height="30" rx="14" fill="#FFB347"/>'
        +     '<text x="100" y="93" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">아 그게 ㅋㅋ</text>'
        +     '<text x="100" y="118" text-anchor="middle" font-size="10" fill="#888">농담으로 풀기</text>'
        +   '</g>'
        +   '<g data-anim="step-3" class="scene-step-anim">'
        +     '<rect x="40" y="30" width="120" height="60" rx="10" fill="#fff" stroke="#FFB347" stroke-width="2" stroke-dasharray="4 3"/>'
        +     '<text x="100" y="66" text-anchor="middle" font-size="13" fill="#888">진짜 얘기 …</text>'
        +     '<text x="100" y="118" text-anchor="middle" font-size="10" fill="#888">다음으로 미뤄짐</text>'
        +   '</g>'
        + '</svg>';
    }
    function sceneR(_) {
      return ''
        + '<svg viewBox="0 0 200 140" preserveAspectRatio="xMidYMid meet">'
        +   '<g data-anim="step-1" class="scene-step-anim">'
        +     '<rect x="30" y="40" width="140" height="60" rx="14" fill="#fff" stroke="#FF9EC4" stroke-width="2"/>'
        +     '<text x="100" y="76" text-anchor="middle" font-size="20">⏳</text>'
        +     '<text x="100" y="120" text-anchor="middle" font-size="10" fill="#888">화해 신호 대기</text>'
        +   '</g>'
        +   '<g data-anim="step-2" class="scene-step-anim">'
        +     '<text x="100" y="64" text-anchor="middle" font-size="22">🌸</text>'
        +     '<text x="64"  y="90" text-anchor="middle" font-size="18">💌</text>'
        +     '<text x="136" y="90" text-anchor="middle" font-size="18">🍰</text>'
        +     '<text x="100" y="118" text-anchor="middle" font-size="10" fill="#888">작은 이벤트 기대</text>'
        +   '</g>'
        +   '<g data-anim="step-3" class="scene-step-anim">'
        +     '<rect x="30" y="40" width="140" height="60" rx="14" fill="#FF9EC4" opacity="0.18"/>'
        +     '<text x="100" y="76" text-anchor="middle" font-size="18">🥀</text>'
        +     '<text x="100" y="120" text-anchor="middle" font-size="10" fill="#888">서운함이 한 겹</text>'
        +   '</g>'
        + '</svg>';
    }

    const $ = (id) => document.getElementById(id);
    let idx = 0;
    let scores = { E: 0, S: 0, A: 0, R: 0, P: 0 };

    function showOnly(id) {
      ['screen-intro','screen-q','screen-loading','screen-result']
        .forEach(s => $(s).classList.toggle('hidden', s !== id));
    }
    function renderDots() {
      const el = $('dots');
      el.innerHTML = '';
      for (let i = 0; i < PATTERNS.length; i++) {
        const d = document.createElement('div');
        d.className = 'dot' + (i <= idx ? ' on' : '');
        el.appendChild(d);
      }
    }
    function renderQ() {
      renderDots();
      const p = PATTERNS[idx];
      $('qtext').textContent = p.text;
      const opts = $('opts');
      opts.innerHTML = '';
      OPTIONS.forEach((o) => {
        const b = document.createElement('button');
        b.className = 'opt';
        b.textContent = o.label;
        b.addEventListener('click', () => answer(p, o));
        opts.appendChild(b);
      });
    }
    function answer(p, o) {
      scores[p.esarp] += o.score;
      gtag('event', 'pattern_answer', { concept_id: CONCEPT_ID, q: idx, score: o.score });
      idx += 1;
      if (idx >= PATTERNS.length) runLoading();
      else renderQ();
    }

    function runLoading() {
      showOnly('screen-loading');
      const reduced = (window.HeartOpenMotion && window.HeartOpenMotion.reduced);
      const steps = [
        '답변 패턴 보고 있어',
        'ESARP 결 매칭 중',
        '우리 사이의 결 정리 중',
        '거의 다 됐어'
      ];
      if (reduced) { finish(); return; }
      let s = 0;
      $('loading-text').textContent = steps[0];
      const t = setInterval(() => {
        s += 1;
        if (s >= steps.length) {
          clearInterval(t);
          finish();
          return;
        }
        $('loading-text').textContent = steps[s];
      }, 600);
    }

    // Stage 1 [Must] — 막대 그래프 (사용자 본인 답변 점수만)
    function renderPatternBars(main) {
      const wrap = $('pattern-bars');
      wrap.innerHTML = '';
      const ariaParts = [];
      ESARP_ORDER.forEach((k) => {
        const v = scores[k] || 0;
        const max = 3;
        const pct = Math.max(0, Math.min(100, Math.round((v / max) * 100)));
        const row = document.createElement('div');
        row.className = 'bar' + (k === main ? ' is-main' : '');
        row.style.setProperty('--bar-color', PATTERN_COLOR[k]);
        row.innerHTML = ''
          + '<span class="bar-label">' + PATTERN_SHORT[k] + '</span>'
          + '<span class="bar-track"><span class="bar-fill" style="width:' + pct + '%;"></span></span>'
          + '<span class="bar-value">' + v + '/' + max + '</span>';
        wrap.appendChild(row);
        ariaParts.push(PATTERN_SHORT[k] + ' ' + v + '점');
      });
      wrap.setAttribute('aria-label', ariaParts.join(', '));
    }

    // Stage 3 [Must] — 시나리오 카드 단계 인터랙션
    let sceneStep = 0;
    let sceneKey  = 'A';
    function renderScene(reset) {
      const scene = SCENES[sceneKey] || SCENES.A;
      if (reset) sceneStep = 0;
      const stage = $('scene-stage');
      const txt   = $('scene-step-text');
      const dots  = $('scene-dots');
      const next  = $('scene-next');
      const breakBox = $('scene-break');
      const card  = $('scene-card');

      $('scene-title').textContent = scene.title;
      stage.style.setProperty('--scene-accent', PATTERN_COLOR[sceneKey]);
      stage.style.setProperty('--scene-bg',
        PATTERN_COLOR[sceneKey] + '22'); // 13% alpha
      card.style.setProperty('--scene-accent', PATTERN_COLOR[sceneKey]);
      breakBox.style.setProperty('--scene-accent', PATTERN_COLOR[sceneKey]);

      stage.innerHTML = scene.steps[sceneStep].svg;
      stage.dataset.step = String(sceneStep);
      txt.innerHTML = '<span class="num">' + (sceneStep + 1) + '</span>' + scene.steps[sceneStep].text;

      const ds = dots.querySelectorAll('.d');
      ds.forEach((d, i) => d.classList.toggle('on', i === sceneStep));

      const last = sceneStep === scene.steps.length - 1;
      next.textContent = last ? '다시 보기 ↺' : '다음 →';
      breakBox.hidden = !last;
      breakBox.innerHTML = last
        ? '<strong>이 패턴 깰 한 마디</strong><br>' + scene.breakLine
        : '';
    }
    function bindScene() {
      const next = $('scene-next');
      const stage = $('scene-stage');
      const advance = () => {
        const len = (SCENES[sceneKey] || SCENES.A).steps.length;
        sceneStep = (sceneStep + 1) % len;
        renderScene(false);
        if (window.HeartOpenHaptic) HeartOpenHaptic.light();
        if (window.HeartOpenSfx) HeartOpenSfx.playSfx('pop');
      };
      next.addEventListener('click', advance);
      stage.addEventListener('click', advance);
    }

    function finish() {
      const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
      const main = sorted[0][0];
      const sub  = sorted[1] && sorted[1][0];
      const T = TYPES[main];

      // 안전 가드: 모든 답변 "없어" → 점수 합계 == 5 (각 1점) → 건강 패턴
      const total = ESARP_ORDER.reduce((acc, k) => acc + (scores[k] || 0), 0);
      const allBaseline = total <= PATTERNS.length;

      // Stage 3 [Must] — A/B variant 부여 (sessionStorage 1회 + ab_assigned GA4)
      const variant = (window.HeartOpenAbVariant
        ? HeartOpenAbVariant.assignVariant(CONCEPT_ID)
        : 'A');
      const card = $('result-card');
      card.classList.remove('variant-a','variant-b');
      card.classList.add(variant === 'B' ? 'variant-b' : 'variant-a');

      $('result-img').src = '../assets/characters/' + T.char;
      $('result-img').alt = T.name;
      $('result-title').textContent = (allBaseline
        ? '건강한 결 🌱'
        : (T.name + ' 결' + (sub ? ' + ' + (TYPES[sub] && TYPES[sub].name || sub) : '')));

      // Stage 1 [Must] — 막대 그래프
      renderPatternBars(main);

      // 시간차 재방문 비교 (Stage 2 Must)
      let trend = '';
      try {
        if (window.HeartOpenLS) {
          const k = HeartOpenLS.lsKey('15', 'history');
          const prev = HeartOpenLS.lsGet(k, []);
          const last = Array.isArray(prev) && prev.length ? prev[prev.length - 1] : null;
          if (last) {
            const days = Math.max(0, Math.floor((Date.now() - last.ts) / 86400000));
            if (last.main !== main && days > 0) trend = ' · ' + days + '일 전 ' + last.main + ' → 지금 ' + main + ' 변화';
            else if (last.main === main && days > 0) trend = ' · ' + days + '일 전과 같은 결';
          }
          HeartOpenLS.lsAppend(k, { main: main, sub: sub, ts: Date.now(), scores: Object.assign({}, scores) }, { cap: 12 });
        }
      } catch (_) {}

      // Stage 3 [Must] — ESARP 톤: `${greeting} ${tip} ${closing}`
      let advice = T.tip;
      if (window.HeartOpenEsarpVoice) {
        const v = HeartOpenEsarpVoice.esarpVoice[main];
        if (v) advice = v.greeting + ' — ' + T.tip + ' ' + v.closing;
      }
      $('result-desc').textContent = (allBaseline
        ? '특별히 두드러지는 갈등 결이 안 보여 — 지금 결이 건강해 🌱'
        : T.desc + trend);
      $('tip-card').textContent = advice;

      // Stage 3 [Must] — 시그니처 시나리오 카드 (메인 패턴 1개)
      sceneKey  = main;
      sceneStep = 0;
      $('scene-card').hidden = !!allBaseline; // 건강 패턴이면 시나리오 숨김
      if (!allBaseline) renderScene(true);

      // Variant B: 텍스트 기본 접힘
      const txtBlock = $('text-block');
      const moreBtn  = $('more-toggle');
      if (variant === 'B') {
        txtBlock.classList.add('collapsed');
        moreBtn.setAttribute('aria-expanded', 'false');
        moreBtn.textContent = '설명 더 보기 ▾';
      } else {
        txtBlock.classList.remove('collapsed');
      }

      gtag('event', 'pattern_complete', {
        concept_id: CONCEPT_ID,
        main_pattern: main,
        sub_pattern: sub || null,
        score_distribution: Object.assign({}, scores),
        ab_variant: variant
      });
      if (window.HeartOpenAnalytics) HeartOpenAnalytics.trackResultView(CONCEPT_ID, main);

      // 결과 reveal SFX + 진동
      if (window.HeartOpenSfx) HeartOpenSfx.playSfx('reveal');
      if (window.HeartOpenHaptic) HeartOpenHaptic.reveal();

      showOnly('screen-result');
    }

    // Stage 3 — SFX 토글 UI (기본 OFF, 사용자 동의 후 ON)
    function syncSfxToggleUi() {
      const btn = $('btn-sfx');
      if (!btn) return;
      const on = !!(window.HeartOpenSfx && HeartOpenSfx.isEnabled());
      btn.setAttribute('aria-pressed', on ? 'true' : 'false');
      btn.textContent = on ? '🔊' : '🔇';
      btn.setAttribute('aria-label', on ? '사운드 끄기' : '사운드 켜기');
    }

    document.addEventListener('DOMContentLoaded', () => {
      syncSfxToggleUi();
      const btn = $('btn-sfx');
      if (btn) {
        btn.addEventListener('click', () => {
          if (!window.HeartOpenSfx) return;
          const on = !HeartOpenSfx.isEnabled();
          HeartOpenSfx.setEnabled(on);
          syncSfxToggleUi();
          if (on) HeartOpenSfx.playSfx('chime');
        });
      }

      // Stage 3 — 시나리오 카드 인터랙션 바인딩 (한 번만)
      bindScene();

      // Variant B "설명 더 보기" 토글
      const moreBtn = $('more-toggle');
      const txtBlock = $('text-block');
      if (moreBtn) {
        moreBtn.addEventListener('click', () => {
          const collapsed = txtBlock.classList.toggle('collapsed');
          moreBtn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
          moreBtn.textContent = collapsed ? '설명 더 보기 ▾' : '설명 접기 ▴';
        });
      }
    });

    $('btn-start').addEventListener('click', () => {
      if (window.HeartOpenAnalytics) {
        HeartOpenAnalytics.trackPageView(CONCEPT_ID, CONCEPT_NAME);
        HeartOpenAnalytics.trackGameStart(CONCEPT_ID, CONCEPT_NAME);
      }
      idx = 0;
      scores = { E: 0, S: 0, A: 0, R: 0, P: 0 };
      showOnly('screen-q');
      renderQ();
    });
    $('btn-share').addEventListener('click', () => {
      // Stage 3 [Must] — share 이벤트에 ab_variant 보강
      const v = (window.HeartOpenAbVariant ? HeartOpenAbVariant.getVariant(CONCEPT_ID) : null);
      gtag('event', 'share', { concept_id: CONCEPT_ID, ab_variant: v });
      HeartOpenResultCard.shareResult({
        conceptId: CONCEPT_ID,
        title: 'Heart Open 우리 패턴 — ' + $('result-title').textContent,
        url: location.href
      });
    });
    $('btn-save').addEventListener('click', () => HeartOpenResultCard.saveResult('#result-card'));
    $('btn-cta').addEventListener('click', () => {
      if (window.HeartOpenAnalytics) HeartOpenAnalytics.trackCtaClick(CONCEPT_ID, 'app_store');
    });
    $('btn-restart').addEventListener('click', () => {
      idx = 0; scores = { E: 0, S: 0, A: 0, R: 0, P: 0 };
      showOnly('screen-intro');
    });
  </script>
