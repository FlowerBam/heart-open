<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>픽토그램 아이스브레이킹 — Heart Open</title>
  <meta name="description" content="그림 3개로 오늘 내 감정을 ESARP으로 표현해봐 🌱">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="../_shared/tokens.css">
  <script src="../_shared/result-esarp.js" defer></script>
  <link rel="stylesheet" href="../shared/result-card.css">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2NYTV5FKDC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-2NYTV5FKDC');
  </script>
  <script src="../shared/analytics.js" defer></script>
  <script src="../_shared/haptic.js" defer></script>
  <script src="../_shared/motion.js" defer></script>
  <script src="../_shared/ga4-funnel.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
  <script src="../shared/result-card.js" defer></script>
  <script src="../_shared/local-storage.js" defer></script>
  <script src="../_shared/share-card-ratio.js" defer></script>
  <script src="../_shared/share-caption.js" defer></script>
  <script src="../_shared/revisit-hook.js" defer></script>
  <script src="../_shared/stage2-engagement.js" defer></script>
  <style>
    .stage { padding-top: var(--space-6); text-align: center; }
    h1 { font-size: 22px; font-weight: 700; }
    .lead { color: var(--text-secondary); font-size: 14px; margin-top: var(--space-2); line-height: 1.6; }

    .pict-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-3);
      margin-top: var(--space-6);
    }
    .pict {
      background: var(--card);
      border: 2px solid transparent;
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-2);
      box-shadow: var(--shadow-sm);
      text-align: center;
      transition: transform 0.15s ease, border-color 0.2s ease, background 0.2s ease;
    }
    .pict-emoji { font-size: 32px; line-height: 1.2; }
    .pict-label { margin-top: var(--space-1); font-size: 11px; color: var(--text-secondary); font-weight: 600; }
    .pict.selected { border-color: var(--primary); background: var(--accent-surface); transform: scale(1.06); }
    .pict.dim { opacity: 0.35; pointer-events: none; }

    .progress {
      margin-top: var(--space-5);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
    }
    .submit, .start, .cta-restart {
      margin-top: var(--space-5);
      width: 100%;
      background: var(--primary);
      color: #fff;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      border-radius: var(--radius-pill);
      box-shadow: var(--shadow-md);
    }
    .submit:disabled { opacity: 0.4; box-shadow: none; }
    .submit:active:not(:disabled), .start:active { transform: scale(0.98); }

    .selected-row {
      display: flex;
      gap: var(--space-3);
      justify-content: center;
      font-size: 28px;
      margin-bottom: var(--space-3);
    }

    .hidden { display: none !important; }

    @keyframes pop-in { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .pop-in { animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  </style>
</head>
<body data-concept-id="pictogram-ice" data-concept-name="픽토그램 무드" data-revisit-hooks="tomorrow,friend" data-share-hashtags="하트오픈픽토그램,오늘의기분">
  <div class="container">
    <section id="screen-intro" class="stage">
      <h1>오늘 나는 어때? 🌱</h1>
      <p class="lead">그림으로 1~3개 골라봐<br>오늘의 내 ESARP 타입을 알려줄게</p>
      <button class="start" id="btn-start">시작하기</button>
    </section>

    <section id="screen-pick" class="stage hidden">
      <h1>오늘의 그림 골라봐</h1>
      <p class="lead">최대 3개까지 선택할 수 있어</p>
      <div class="pict-grid" id="pict-grid"></div>
      <div class="progress" id="progress">0 / 3 선택</div>
      <button class="submit" id="btn-submit" disabled>결과 보기</button>
    </section>

    <section id="screen-result" class="stage hidden">
      <div class="result-card pop-in" id="result-card" role="status" aria-live="polite" aria-atomic="true">
        <div class="selected-row" id="selected-row"></div>
        <img id="result-img" src="" alt="">
        <div class="result-title" id="result-title"></div>
        <div class="result-desc" id="result-desc"></div>
        <div class="result-actions">
          <button class="btn-share" id="btn-share">공유</button>
          <button class="btn-save" id="btn-save">저장</button>
        </div>
        <a class="btn-cta" id="btn-cta" href="https://heartopen.app">앱에서 더 자세히 분석 →</a>
      </div>
      <button class="cta-restart" id="btn-restart" style="background:transparent;color:var(--text-secondary);box-shadow:none;">다시 해보기</button>
    </section>
  </div>

  <script>
    const CONCEPT_ID = '05';
    const CONCEPT_NAME = '픽토그램 아이스브레이킹';

    const PICTOGRAMS = [
      { id: 'hug',   emoji: '🤗', label: '안기고싶어',   type: 'E' },
      { id: 'cry',   emoji: '😢', label: '울컥했어',     type: 'E' },
      { id: 'heart', emoji: '💕', label: '사랑넘쳐',     type: 'E' },
      { id: 'party', emoji: '🎉', label: '신나',         type: 'S' },
      { id: 'chat',  emoji: '💬', label: '수다떨고싶어', type: 'S' },
      { id: 'laugh', emoji: '😂', label: '웃겨죽겠어',   type: 'S' },
      { id: 'home',  emoji: '🏠', label: '집에있고싶어', type: 'A' },
      { id: 'cozy',  emoji: '🛋️', label: '나란히앉고싶어', type: 'A' },
      { id: 'safe',  emoji: '🌙', label: '안정적이야',   type: 'A' },
      { id: 'star',  emoji: '✨', label: '설레',         type: 'R' },
      { id: 'flower',emoji: '🌸', label: '기분좋아',     type: 'R' },
      { id: 'dream', emoji: '🌈', label: '꿈같아',       type: 'R' },
      { id: 'check', emoji: '✅', label: '뭔가해야해',   type: 'P' },
      { id: 'coffee',emoji: '☕', label: '집중해야해',   type: 'P' },
      { id: 'plan',  emoji: '📋', label: '계획세우고싶어', type: 'P' }
    ];

    const TYPES = {
      E: { name: '감정', file: 'emotion.png',    desc: '오늘 너는 감정에 솔직한 하루! 마음을 표현해봐 💕' },
      S: { name: '사교', file: 'social.png',     desc: '오늘 너는 활기 넘치는 모드! 함께 웃어봐 ✨' },
      A: { name: '애착', file: 'attachment.png', desc: '오늘 너는 안정과 포근함을 원하는 날 🌙' },
      R: { name: '낭만', file: 'romantic.png',   desc: '오늘 너는 설렘 가득, 낭만 모드야 🌸' },
      P: { name: '현실', file: 'practical.png',  desc: '오늘 너는 차분하고 단단한 현실 모드 🌱' }
    };

    const $ = (id) => document.getElementById(id);
    const selected = new Set();

    function renderGrid() {
      const grid = $('pict-grid');
      grid.innerHTML = '';
      PICTOGRAMS.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'pict';
        btn.dataset.id = p.id;
        btn.innerHTML = '<div class="pict-emoji">' + p.emoji + '</div><div class="pict-label">' + p.label + '</div>';
        btn.addEventListener('click', () => togglePict(p.id, btn));
        grid.appendChild(btn);
      });
    }

    function togglePict(id, btn) {
      if (selected.has(id)) {
        selected.delete(id);
        btn.classList.remove('selected');
      } else {
        if (selected.size >= 3) return;
        selected.add(id);
        btn.classList.add('selected');
      }
      $('progress').textContent = selected.size + ' / 3 선택';
      $('btn-submit').disabled = selected.size === 0;
      document.querySelectorAll('.pict').forEach(el => {
        el.classList.toggle('dim', selected.size >= 3 && !selected.has(el.dataset.id));
      });
    }

    function calcType() {
      const freq = {};
      selected.forEach(id => {
        const p = PICTOGRAMS.find(x => x.id === id);
        freq[p.type] = (freq[p.type] || 0) + 1;
      });
      return Object.entries(freq).sort((a,b) => b[1]-a[1])[0][0];
    }

    function showOnly(id) {
      ['screen-intro','screen-pick','screen-result'].forEach(s => $(s).classList.toggle('hidden', s !== id));
    }

    $('btn-start').addEventListener('click', () => {
      if (window.HeartOpenAnalytics) {
        HeartOpenAnalytics.trackPageView(CONCEPT_ID, CONCEPT_NAME);
        HeartOpenAnalytics.trackGameStart(CONCEPT_ID, CONCEPT_NAME);
      }
      renderGrid();
      showOnly('screen-pick');
    });

    $('btn-submit').addEventListener('click', () => {
      const ids = Array.from(selected);
      gtag('event', 'pictogram_select', { concept_id: CONCEPT_ID, selected_ids: ids.join(',') });
      const type = calcType();
      const t = TYPES[type];
      $('selected-row').innerHTML = ids.map(id => {
        const p = PICTOGRAMS.find(x => x.id === id);
        return '<span>' + p.emoji + '</span>';
      }).join('');
      $('result-img').src = '../assets/characters/' + t.file;
      $('result-img').alt = t.name + ' 타입';
      $('result-title').textContent = '오늘의 나는 ' + t.name + ' 모드!';
      $('result-desc').textContent = t.desc;
      showOnly('screen-result');
      if (window.HeartOpenAnalytics) HeartOpenAnalytics.trackResultView(CONCEPT_ID, type);
    });

    $('btn-share').addEventListener('click', () => {
      HeartOpenResultCard.shareResult({
        conceptId: CONCEPT_ID,
        title: 'Heart Open 오늘의 그림 — ' + $('result-title').textContent,
        url: location.href
      });
    });
    $('btn-save').addEventListener('click', () => HeartOpenResultCard.saveResult('#result-card'));
    $('btn-cta').addEventListener('click', () => {
      if (window.HeartOpenAnalytics) HeartOpenAnalytics.trackCtaClick(CONCEPT_ID, 'app_store');
    });
    $('btn-restart').addEventListener('click', () => {
      selected.clear();
      $('btn-submit').disabled = true;
      $('progress').textContent = '0 / 3 선택';
      showOnly('screen-intro');
    });
  </script>
</body>
</html>
