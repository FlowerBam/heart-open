<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>슬롯 매칭 — Heart Open</title>
  <meta name="description" content="1문제 답변 후 슬롯이 내 ESARP 타입을 뽑아준다 🎰">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="../shared/result-card.css">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2NYTV5FKDC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-2NYTV5FKDC');
  </script>
  <script src="../shared/analytics.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
  <script src="../shared/result-card.js" defer></script>
  <style>
    .stage { padding-top: var(--space-6); text-align: center; }
    h1 { font-size: 22px; font-weight: 700; }
    .lead { color: var(--text-secondary); font-size: 14px; margin-top: var(--space-2); line-height: 1.6; }

    .question {
      margin-top: var(--space-8);
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: var(--space-6) var(--space-5);
      box-shadow: var(--shadow-sm);
    }
    .q-text { font-size: 18px; font-weight: 700; line-height: 1.4; }
    .choices { display: grid; gap: var(--space-3); margin-top: var(--space-5); }
    .choice {
      background: var(--surface-warm);
      border: 2px solid transparent;
      border-radius: var(--radius-md);
      padding: var(--space-4);
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      transition: transform 0.15s ease, border-color 0.2s ease, background 0.2s ease;
    }
    .choice:active { transform: scale(0.98); }
    .choice.selected { border-color: var(--primary); background: var(--accent-surface); transform: scale(1.02); }

    .slot {
      margin-top: var(--space-8);
      height: 220px;
      overflow: hidden;
      position: relative;
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, var(--accent-surface) 0%, var(--surface-warm) 100%);
      box-shadow: var(--shadow-md);
      display: flex; align-items: center; justify-content: center;
    }
    .reel {
      display: flex; flex-direction: column; align-items: center;
      will-change: transform;
    }
    .reel img { width: 180px; height: 180px; object-fit: contain; }
    .slot-mask {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(255,249,247,0.9) 0%, rgba(255,249,247,0) 25%, rgba(255,249,247,0) 75%, rgba(255,249,247,0.9) 100%);
      pointer-events: none;
    }

    .start, .cta-restart {
      margin-top: var(--space-6);
      width: 100%;
      background: var(--primary);
      color: #fff;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      border-radius: var(--radius-pill);
      box-shadow: var(--shadow-md);
    }
    .start:active { transform: scale(0.98); }

    .hidden { display: none !important; }

    @keyframes pop-in { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .pop-in { animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  </style>
</head>
<body>
  <div class="container">
    <section id="screen-intro" class="stage">
      <h1>나는 어떤 연애 타입일까? 🎰</h1>
      <p class="lead">1문제 풀고 슬롯 돌려서<br>내 ESARP 타입을 뽑아봐</p>
      <button class="start" id="btn-start">시작하기</button>
    </section>

    <section id="screen-question" class="stage hidden">
      <div class="question">
        <div class="q-text" id="q-text"></div>
        <div class="choices">
          <button class="choice" data-choice="a" id="choice-a"></button>
          <button class="choice" data-choice="b" id="choice-b"></button>
        </div>
      </div>
    </section>

    <section id="screen-slot" class="stage hidden">
      <h1>슬롯 돌리는 중...</h1>
      <p class="lead">두근두근 ✨</p>
      <div class="slot">
        <div class="reel" id="reel"></div>
        <div class="slot-mask"></div>
      </div>
    </section>

    <section id="screen-result" class="stage hidden">
      <div class="result-card pop-in" id="result-card">
        <img id="result-img" src="" alt="">
        <div class="result-title" id="result-title"></div>
        <div class="result-desc" id="result-desc"></div>
        <div class="result-actions">
          <button class="btn-share" id="btn-share">공유</button>
          <button class="btn-save" id="btn-save">저장</button>
        </div>
        <a class="btn-cta" id="btn-cta" href="https://heartopen.app">앱에서 더 자세히 분석 →</a>
      </div>
      <button class="cta-restart" id="btn-restart" style="background:transparent;color:var(--text-secondary);box-shadow:none;">다시 해보기</button>
    </section>
  </div>

  <script>
    const CONCEPT_ID = '01';
    const CONCEPT_NAME = '슬롯 매칭';

    const QUESTION = {
      text: '다툰 다음 날, 나는?',
      a: '바로 연락해',
      b: '상대방 연락 기다려',
      aType: 'E',
      bType: 'A'
    };

    const TYPES = {
      E: { name: '감정', file: 'emotion.png',    desc: '감정을 솔직하게 표현하는 게 나야' },
      S: { name: '사교', file: 'social.png',     desc: '사람들과 함께일 때 가장 빛나는 타입' },
      A: { name: '애착', file: 'attachment.png', desc: '안정과 신뢰를 사랑하는 타입이야' },
      R: { name: '낭만', file: 'romantic.png',   desc: '낭만과 설렘을 좇는 사람이야' },
      P: { name: '현실', file: 'practical.png',  desc: '현실적이고 단단한 사랑을 하는 타입' }
    };
    const TYPE_ORDER = ['E','S','A','R','P'];

    const $ = (id) => document.getElementById(id);

    function showOnly(id) {
      ['screen-intro','screen-question','screen-slot','screen-result'].forEach(s => {
        $(s).classList.toggle('hidden', s !== id);
      });
    }

    $('btn-start').addEventListener('click', () => {
      if (window.HeartOpenAnalytics) {
        HeartOpenAnalytics.trackPageView(CONCEPT_ID, CONCEPT_NAME);
        HeartOpenAnalytics.trackGameStart(CONCEPT_ID, CONCEPT_NAME);
      }
      $('q-text').textContent = QUESTION.text;
      $('choice-a').textContent = QUESTION.a;
      $('choice-b').textContent = QUESTION.b;
      showOnly('screen-question');
    });

    document.querySelectorAll('.choice').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.choice').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        const choice = btn.dataset.choice;
        gtag('event', 'question_answer', { concept_id: CONCEPT_ID, choice });
        const type = choice === 'a' ? QUESTION.aType : QUESTION.bType;
        setTimeout(() => runSlot(type), 350);
      });
    });

    function runSlot(targetType) {
      showOnly('screen-slot');
      const reel = $('reel');
      reel.innerHTML = '';
      const sequence = [];
      for (let i = 0; i < 4; i++) sequence.push(...TYPE_ORDER);
      sequence.push(targetType);
      sequence.forEach(t => {
        const img = document.createElement('img');
        img.src = '../assets/characters/' + TYPES[t].file;
        img.alt = TYPES[t].name;
        reel.appendChild(img);
      });
      const itemHeight = 180;
      const finalIndex = sequence.length - 1;
      reel.style.transform = 'translateY(20px)';
      reel.animate(
        [
          { transform: 'translateY(20px)' },
          { transform: 'translateY(' + (-finalIndex * itemHeight + 20) + 'px)' }
        ],
        { duration: 1500, easing: 'cubic-bezier(0.22, 1, 0.36, 1)', fill: 'forwards' }
      );
      setTimeout(() => {
        if (navigator.vibrate) navigator.vibrate(200);
        showResult(targetType);
      }, 1600);
    }

    function showResult(type) {
      const t = TYPES[type];
      $('result-img').src = '../assets/characters/' + t.file;
      $('result-img').alt = t.name + ' 타입';
      $('result-title').textContent = t.name + ' 타입이에요!';
      $('result-desc').textContent = t.desc;
      showOnly('screen-result');
      if (window.HeartOpenAnalytics) HeartOpenAnalytics.trackResultView(CONCEPT_ID, type);
    }

    $('btn-share').addEventListener('click', () => {
      HeartOpenResultCard.shareResult({
        conceptId: CONCEPT_ID,
        title: 'Heart Open 슬롯 매칭 결과 — ' + $('result-title').textContent,
        url: location.href
      });
    });
    $('btn-save').addEventListener('click', () => HeartOpenResultCard.saveResult('#result-card'));
    $('btn-cta').addEventListener('click', () => {
      if (window.HeartOpenAnalytics) HeartOpenAnalytics.trackCtaClick(CONCEPT_ID, 'app_store');
    });
    $('btn-restart').addEventListener('click', () => {
      document.querySelectorAll('.choice').forEach(b => b.classList.remove('selected'));
      showOnly('screen-intro');
    });
  </script>
</body>
</html>
