<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>동시 답변 — Heart Open</title>
  <meta name="description" content="5초 안에 3문제 — 남친이랑 얼마나 통할까?">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="../_shared/tokens.css">
  <script src="../_shared/result-esarp.js" defer></script>
  <link rel="stylesheet" href="../shared/result-card.css">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2NYTV5FKDC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-2NYTV5FKDC');
  </script>
  <script src="../shared/analytics.js" defer></script>
  <script src="../_shared/haptic.js" defer></script>
  <script src="../_shared/motion.js" defer></script>
  <script src="../_shared/ga4-funnel.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
  <script src="../shared/result-card.js" defer></script>
  <script src="../_shared/local-storage.js" defer></script>
  <script src="../_shared/share-card-ratio.js" defer></script>
  <script src="../_shared/share-caption.js" defer></script>
  <script src="../_shared/revisit-hook.js" defer></script>
  <script src="../_shared/stage2-engagement.js" defer></script>
  <style>
    .stage { padding-top: var(--space-6); text-align: center; }
    h1 { font-size: 22px; font-weight: 700; }
    .lead { color: var(--text-secondary); font-size: 14px; margin-top: var(--space-2); line-height: 1.6; }

    .start, .cta-restart {
      margin-top: var(--space-6); width: 100%;
      background: var(--primary); color: #fff;
      padding: 16px; font-size: 16px; font-weight: 700;
      border-radius: var(--radius-pill); box-shadow: var(--shadow-md);
    }

    .timer-wrap { display: flex; justify-content: center; margin-top: var(--space-5); }
    .timer-circle {
      width: 90px; height: 90px;
      transform: rotate(-90deg);
    }
    .timer-circle .bg { fill: none; stroke: var(--accent-surface); stroke-width: 8; }
    .timer-circle .fg {
      fill: none; stroke: var(--primary); stroke-width: 8; stroke-linecap: round;
      stroke-dasharray: 283; stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
    }
    .timer-circle.hot .fg { stroke: #ff3b6b; }
    .timer-num {
      position: absolute; transform: translate(-50%, -50%);
      left: 50%; top: 50%;
      font-size: 28px; font-weight: 800; color: var(--primary-dark);
    }
    .timer-rel { position: relative; width: 90px; height: 90px; margin: 0 auto; }

    .round-num { font-size: 12px; color: var(--text-secondary); margin-top: var(--space-4); }

    .question-card {
      margin-top: var(--space-5);
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: var(--space-6) var(--space-5);
      box-shadow: var(--shadow-sm);
      background-image: url('../assets/cards/balance_game.png');
      background-size: cover;
      background-position: center;
      background-blend-mode: lighten;
    }
    .q-text { font-size: 17px; font-weight: 700; line-height: 1.4; }
    .choices { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); margin-top: var(--space-5); }
    .choice {
      background: rgba(255,255,255,0.95);
      border: 2px solid transparent;
      border-radius: var(--radius-md);
      padding: var(--space-4);
      font-size: 14px; font-weight: 600;
      color: var(--text-primary);
      transition: transform 0.15s ease, border-color 0.2s ease;
      min-height: 64px;
    }
    .choice:active { transform: scale(0.98); }
    .choice.selected { border-color: var(--primary); background: var(--accent-surface); }
    .label { font-size: 11px; color: var(--primary-dark); margin-bottom: var(--space-2); font-weight: 700; }

    .pair { background: rgba(255,255,255,0.85); border-radius: var(--radius-md); padding: var(--space-3); }

    .sync-num {
      font-size: 56px; font-weight: 800;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      line-height: 1;
    }

    .hidden { display: none !important; }

    @keyframes pop-in { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .pop-in { animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  </style>
</head>
<body data-concept-id="sync-answer" data-concept-name="동시답변" data-revisit-hooks="partner,friend" data-share-hashtags="하트오픈동시답변,텔레파시">
  <div class="container">
    <section id="screen-intro" class="stage">
      <h1>동시 답변 ✨</h1>
      <p class="lead">5초 안에 답해봐!<br>남친 생각이랑 얼마나 통할까?</p>
      <button class="start" id="btn-start">시작하기</button>
    </section>

    <section id="screen-round" class="stage hidden">
      <div class="round-num" id="round-num"></div>
      <div class="timer-wrap">
        <div class="timer-rel">
          <svg class="timer-circle" id="timer-svg" viewBox="0 0 100 100">
            <circle class="bg" cx="50" cy="50" r="45"></circle>
            <circle class="fg" id="timer-fg" cx="50" cy="50" r="45"></circle>
          </svg>
          <div class="timer-num" id="timer-num">5</div>
        </div>
      </div>

      <div class="question-card">
        <div class="q-text" id="q-text"></div>

        <div class="pair" style="margin-top:16px;">
          <div class="label">내 답</div>
          <div class="choices">
            <button class="choice" data-side="me" data-choice="a" id="me-a"></button>
            <button class="choice" data-side="me" data-choice="b" id="me-b"></button>
          </div>
        </div>

        <div class="pair" style="margin-top:12px;">
          <div class="label">남친 예상 답</div>
          <div class="choices">
            <button class="choice" data-side="bf" data-choice="a" id="bf-a"></button>
            <button class="choice" data-side="bf" data-choice="b" id="bf-b"></button>
          </div>
        </div>
      </div>
    </section>

    <section id="screen-result" class="stage hidden">
      <div class="result-card pop-in" id="result-card" role="status" aria-live="polite" aria-atomic="true">
        <div class="sync-num" id="sync-num"></div>
        <div style="font-size:14px; color:var(--text-secondary); margin-top:-8px;">남친이랑 통한 정도</div>
        <img id="result-img" src="" alt="">
        <div class="result-title" id="result-title"></div>
        <div class="result-desc" id="result-desc"></div>
        <div class="result-actions">
          <button class="btn-share" id="btn-share">공유</button>
          <button class="btn-save" id="btn-save">저장</button>
        </div>
        <a class="btn-cta" id="btn-cta" href="https://heartopen.app">앱에서 더 자세히 분석 →</a>
      </div>
      <button class="cta-restart" id="btn-restart" style="background:transparent;color:var(--text-secondary);box-shadow:none;">다시 해보기</button>
    </section>
  </div>

  <script>
    const CONCEPT_ID = '03';
    const CONCEPT_NAME = '동시 답변';

    const QUESTIONS = [
      { text: '주말 데이트, 뭐가 더 좋아?', a: '카페에서 브런치 ☕', b: '야외에서 활동적인 것 🏃', ta: 'S', tb: 'E' },
      { text: '갈등이 생기면 나는?', a: '바로 말해 버려', b: '시간을 두고 정리해', ta: 'E', tb: 'A' },
      { text: '사귄 기념일에?', a: '같이 있어야 해', b: '선물이면 충분해', ta: 'A', tb: 'P' }
    ];

    const TYPES = {
      E: { name: '감정', file: 'emotion.png',    desc: '감정을 솔직하게 표현하는 게 나야' },
      S: { name: '사교', file: 'social.png',     desc: '사람들과 함께일 때 가장 빛나는 타입' },
      A: { name: '애착', file: 'attachment.png', desc: '안정과 신뢰를 사랑하는 타입이야' },
      R: { name: '낭만', file: 'romantic.png',   desc: '낭만과 설렘을 좇는 사람이야' },
      P: { name: '현실', file: 'practical.png',  desc: '현실적이고 단단한 사랑을 하는 타입' }
    };

    const $ = (id) => document.getElementById(id);
    const showOnly = (id) => ['screen-intro','screen-round','screen-result'].forEach(s =>
      $(s).classList.toggle('hidden', s !== id));

    let roundIdx = 0;
    let myAnswers = [];
    let bfPredictions = [];
    let timer = null;

    $('btn-start').addEventListener('click', () => {
      if (window.HeartOpenAnalytics) {
        HeartOpenAnalytics.trackPageView(CONCEPT_ID, CONCEPT_NAME);
        HeartOpenAnalytics.trackGameStart(CONCEPT_ID, CONCEPT_NAME);
      }
      roundIdx = 0;
      myAnswers = [];
      bfPredictions = [];
      showOnly('screen-round');
      renderRound();
    });

    function renderRound() {
      const q = QUESTIONS[roundIdx];
      $('round-num').textContent = '라운드 ' + (roundIdx + 1) + ' / 3';
      $('q-text').textContent = q.text;
      $('me-a').textContent = q.a;
      $('me-b').textContent = q.b;
      $('bf-a').textContent = q.a;
      $('bf-b').textContent = q.b;
      document.querySelectorAll('.choice').forEach(b => b.classList.remove('selected'));
      startTimer();
    }

    function startTimer() {
      let timeLeft = 5;
      const fg = $('timer-fg');
      const svg = $('timer-svg');
      svg.classList.remove('hot');
      fg.style.transition = 'none';
      fg.style.strokeDashoffset = '0';
      void fg.getBoundingClientRect();
      fg.style.transition = 'stroke-dashoffset 1s linear, stroke 0.3s ease';
      $('timer-num').textContent = timeLeft;
      const tick = () => {
        timeLeft--;
        $('timer-num').textContent = Math.max(0, timeLeft);
        const offset = 283 * (1 - timeLeft / 5);
        fg.style.strokeDashoffset = offset;
        if (timeLeft <= 2) svg.classList.add('hot');
        if (timeLeft <= 0) {
          clearInterval(timer);
          autoFill();
          finishRound();
        }
      };
      timer = setInterval(tick, 1000);
    }

    function autoFill() {
      const meSel = document.querySelector('.choice[data-side="me"].selected');
      const bfSel = document.querySelector('.choice[data-side="bf"].selected');
      if (!meSel) {
        const c = Math.random() < 0.5 ? 'a' : 'b';
        document.getElementById('me-' + c).classList.add('selected');
      }
      if (!bfSel) {
        const c = Math.random() < 0.5 ? 'a' : 'b';
        document.getElementById('bf-' + c).classList.add('selected');
      }
    }

    document.querySelectorAll('.choice').forEach(btn => {
      btn.addEventListener('click', () => {
        const side = btn.dataset.side;
        document.querySelectorAll('.choice[data-side="' + side + '"]').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        const me = document.querySelector('.choice[data-side="me"].selected');
        const bf = document.querySelector('.choice[data-side="bf"].selected');
        if (me && bf) {
          clearInterval(timer);
          finishRound();
        }
      });
    });

    function finishRound() {
      const me = document.querySelector('.choice[data-side="me"].selected').dataset.choice;
      const bf = document.querySelector('.choice[data-side="bf"].selected').dataset.choice;
      myAnswers.push(me);
      bfPredictions.push(bf);
      gtag('event', 'round_complete', { concept_id: CONCEPT_ID, round: roundIdx + 1, answer: me });
      roundIdx++;
      if (roundIdx >= QUESTIONS.length) showResult();
      else setTimeout(renderRound, 300);
    }

    // ESARP 응답 비교 기반 결정론적 계산 (evolution/03_sync_answer_evo.md Must)
    function calcConsistency(types) {
      const freq = types.reduce((a, t) => (a[t] = (a[t] || 0) + 1, a), {});
      const max = Math.max(...Object.values(freq));
      return Math.round((max / types.length) * 100);
    }

    function showResult() {
      const myTypes = myAnswers.map((ans, i) => ans === 'a' ? QUESTIONS[i].ta : QUESTIONS[i].tb);
      const bfTypes = bfPredictions.map((ans, i) => ans === 'a' ? QUESTIONS[i].ta : QUESTIONS[i].tb);
      const agree = myTypes.reduce((n, t, i) => n + (t === bfTypes[i] ? 1 : 0), 0);
      const coupleMatch = Math.round((agree / myTypes.length) * 100);
      const consistency = calcConsistency(myTypes);
      const syncRate = coupleMatch;

      const counts = myTypes.reduce((a, t) => (a[t] = (a[t] || 0) + 1, a), {});
      let topType = 'E', topCount = -1;
      Object.entries(counts).forEach(([t, c]) => { if (c > topCount) { topCount = c; topType = t; } });

      gtag('event', 'sync_calc', { concept_id: CONCEPT_ID, mode: 'solo', rate: syncRate, consistency });

      const t = TYPES[topType];
      $('sync-num').textContent = syncRate + '%';
      $('result-img').src = '../assets/characters/' + t.file;
      $('result-img').alt = t.name + ' 타입';
      $('result-title').textContent = '내 타입은 ' + t.name + '!';
      $('result-desc').textContent = t.desc + ' · 남친한테 링크 보내서 진짜로 비교해봐 ✨';
      showOnly('screen-result');
      if (window.HeartOpenAnalytics) {
        HeartOpenAnalytics.trackResultView(CONCEPT_ID, topType + '_' + syncRate);
      }
    }

    $('btn-share').addEventListener('click', () => {
      HeartOpenResultCard.shareResult({
        conceptId: CONCEPT_ID,
        title: 'Heart Open 동시 답변 — ' + $('sync-num').textContent + ' 통했어',
        url: location.href
      });
    });
    $('btn-save').addEventListener('click', () => HeartOpenResultCard.saveResult('#result-card'));
    $('btn-cta').addEventListener('click', () => {
      if (window.HeartOpenAnalytics) HeartOpenAnalytics.trackCtaClick(CONCEPT_ID, 'app_store');
    });
    $('btn-restart').addEventListener('click', () => showOnly('screen-intro'));
  </script>
</body>
</html>
